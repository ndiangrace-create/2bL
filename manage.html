<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>平台管理工具 | 兔彼樂</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f8f5ef;color:#2a2a24;padding:24px 16px}
.wrap{max-width:900px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.topbar h1{font-size:20px;font-weight:900;color:#3a7d5c}
.btn{padding:10px 18px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-g{background:#3a7d5c;color:#fff}
.btn-r{background:#fdecea;color:#d94f4f}
.btn-y{background:#fff8e6;color:#b7860b}
.btn-s{background:#f0f0ee;color:#555}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px}
.card h2{font-size:16px;font-weight:800;margin-bottom:12px;color:#2a2a24}
.login-box{max-width:380px;margin:60px auto}
.login-box p{font-size:14px;color:#666;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f3f8f3;padding:10px 8px;text-align:left;font-size:12px;font-weight:700;color:#3a7d5c;border-bottom:2px solid #d4ece0}
td{padding:10px 8px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:700}
.badge-pending{background:#fff8e6;color:#b7860b}
.badge-approved{background:#e8f7ee;color:#3a7d5c}
.badge-locked{background:#fdecea;color:#d94f4f}
.badge-trial{background:#e8f7ee;color:#3a7d5c}
.badge-active{background:#eaf1fb;color:#2e5c80}
input[type=text],input[type=email],input[type=number]{padding:10px 12px;border:1.5px solid #ddeee5;border-radius:9px;font-size:14px;font-family:inherit;width:100%;outline:none}
input:focus{border-color:#3a7d5c}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:min(94vw,480px);max-height:88vh;overflow-y:auto}
.modal-box h3{font-size:17px;font-weight:800;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;font-size:15px}
label{font-size:13px;color:#555;font-weight:700;display:block;margin-bottom:4px;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">

  <!-- 登入區 -->
  <div id="loginSection">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:28px;margin-bottom:8px">🌿</div>
        <h1 style="font-size:20px;font-weight:900;color:#3a7d5c">平台管理工具</h1>
        <p style="font-size:13px;color:#888;margin-top:4px">僅限平台管理員使用</p>
      </div>
      <div class="card">
        <p>請使用 Google 帳號登入（需為平台管理員）</p>
        <button class="btn btn-g" style="width:100%;padding:14px;font-size:16px" onclick="startLogin()">
          使用 Google 帳號登入
        </button>
        <div id="loginErr" style="font-size:13px;color:#d94f4f;margin-top:10px;display:none"></div>
      </div>
    </div>
  </div>

  <!-- 主介面 -->
  <div id="mainSection" style="display:none">
    <div class="topbar">
      <h1>🌿 平台管理工具</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="adminName" style="font-size:14px;color:#666"></span>
        <button class="btn btn-s" onclick="logout()">登出</button>
      </div>
    </div>

    <!-- 申請列表 -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2>📋 申請列表</h2>
        <button class="btn btn-g" onclick="loadApplyList()">↻ 重新整理</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>品牌名稱</th>
              <th>聯絡人</th>
              <th>Email</th>
              <th>活動類型</th>
              <th>申請時間</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="applyTable">
            <tr><td colspan="7" style="text-align:center;color:#aaa;padding:20px">載入中…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 租戶管理 -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2>🏪 租戶管理</h2>
        <button class="btn btn-g" onclick="loadTenants()">↻ 重新整理</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>品牌名稱</th>
              <th>Tenant ID</th>
              <th>方案</th>
              <th>試用到期</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tenantTable">
            <tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">載入中…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 開通 Modal -->
<div class="modal" id="approveModal">
  <div class="modal-box">
    <h3>✅ 確認開通</h3>
    <div id="approveInfo" style="font-size:14px;color:#555;margin-bottom:12px;line-height:1.7"></div>
    <label>Tenant ID（系統自動產生，可修改）</label>
    <input type="text" id="approveTenantId" placeholder="例：market_abc">
    <div class="modal-actions">
      <button class="btn btn-s" onclick="closeModal('approveModal')">取消</button>
      <button class="btn btn-g" onclick="confirmApprove()">確認開通</button>
    </div>
  </div>
</div>

<!-- 解鎖 Modal -->
<div class="modal" id="unlockModal">
  <div class="modal-box">
    <h3>🔓 確認解鎖 / 續費</h3>
    <div id="unlockInfo" style="font-size:14px;color:#555;margin-bottom:12px"></div>
    <label>收款金額（NT$）</label>
    <input type="number" id="unlockAmount" placeholder="0">
    <label>稅金（NT$）</label>
    <input type="number" id="unlockTax" placeholder="0">
    <label>備註</label>
    <input type="text" id="unlockNote" placeholder="例：1%按場次計費，2026/06">
    <div class="modal-actions">
      <button class="btn btn-s" onclick="closeModal('unlockModal')">取消</button>
      <button class="btn btn-g" onclick="confirmUnlock()">確認解鎖</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://REPLACE_WITH_2BL_V7_WORKER_URL.workers.dev';
let ST = { token: null, email: null };
let currentApplyId = null;
let currentTenantId = null;

function startLogin() {
  const workerBase = API_BASE.replace(/\/+$/, '');
  window.location.href = `${workerBase}/auth/google/start?tenant=platform&next=admin`;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const adminToken = params.get('admin_token');
  const loginError = params.get('login_error');

  if (loginError) {
    const errEl = document.getElementById('loginErr');
    errEl.textContent = '登入失敗：您的帳號不在平台管理員名單內';
    errEl.style.display = 'block';
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  if (!adminToken) return;

  try {
    const workerBase = API_BASE.replace(/\/+$/, '');
    const res = await fetch(`${workerBase}/admin/me?email=_&token=${encodeURIComponent(adminToken)}&_t=${Date.now()}`, { cache: 'no-store' }).then(r => r.json());
    if (res.error || res.normalized_role !== 'platform_super_admin') {
      document.getElementById('loginErr').textContent = '您不是平台管理員，無法使用此工具';
      document.getElementById('loginErr').style.display = 'block';
      window.history.replaceState({}, '', window.location.pathname);
      return;
    }
    ST.token = adminToken;
    ST.email = res.email;
    localStorage.setItem('manage_session', JSON.stringify({ token: adminToken, email: res.email, name: res.display_name }));
    window.history.replaceState({}, '', window.location.pathname);
    showMain(res.display_name || res.email);
  } catch(e) {
    document.getElementById('loginErr').textContent = '驗證失敗，請重試';
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showMain(name) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('mainSection').style.display = 'block';
  document.getElementById('adminName').textContent = name;
  loadApplyList();
  loadTenants();
}

function logout() {
  localStorage.removeItem('manage_session');
  ST = { token: null, email: null };
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('mainSection').style.display = 'none';
}

async function api(params) {
  params.token = ST.token;
  params.email = ST.email;
  params._t = Date.now();
  const qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
  const res = await fetch(API_BASE + '?' + qs, { cache: 'no-store' });
  return res.json();
}

async function apiPost(body) {
  body.token = ST.token;
  body.email = ST.email;
  const res = await fetch(API_BASE + '?_t=' + Date.now(), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

async function loadApplyList() {
  const tbody = document.getElementById('applyTable');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:20px">載入中…</td></tr>';
  try {
    const rows = await api({ action: 'applyList' });
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:16px">目前無申請記錄</td></tr>'; return; }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><b>${r.brand_name}</b></td>
        <td>${r.contact_name || '-'}</td>
        <td>${r.contact_email}</td>
        <td>${r.event_type || '-'}</td>
        <td style="font-size:12px;color:#888">${new Date(r.created_at).toLocaleDateString('zh-TW')}</td>
        <td><span class="badge badge-${r.status === 'pending' ? 'pending' : r.status === 'approved' ? 'approved' : 'locked'}">${r.status === 'pending' ? '待處理' : r.status === 'approved' ? '已開通' : '已拒絕'}</span></td>
        <td>${r.status === 'pending' ? `<button class="btn btn-g" style="font-size:12px;padding:6px 12px" onclick="openApprove('${r.id}','${r.brand_name.replace(/'/g,"\\'")}','${r.contact_email}')">開通</button>` : '-'}</td>
      </tr>
    `).join('');
  } catch(e) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#d94f4f">載入失敗</td></tr>'; }
}

async function loadTenants() {
  const tbody = document.getElementById('tenantTable');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">載入中…</td></tr>';
  try {
    const rows = await api({ action: 'getTenantsAdmin' });
    if (!Array.isArray(rows) || !rows.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa">無租戶</td></tr>'; return; }
    tbody.innerHTML = rows.map(t => `
      <tr>
        <td><b>${t.name}</b></td>
        <td style="font-size:12px;color:#888">${t.id}</td>
        <td><span class="badge badge-${t.plan_type === 'trial' ? 'trial' : 'active'}">${t.plan_type === 'trial' ? '試用' : '正式'}</span></td>
        <td style="font-size:12px;color:#888">${t.trial_end_at ? new Date(t.trial_end_at).toLocaleDateString('zh-TW') : '-'}</td>
        <td><span class="badge badge-${t.is_locked ? 'locked' : 'approved'}">${t.is_locked ? '🔒 鎖定' : '✅ 正常'}</span></td>
        <td style="display:flex;gap:4px">
          ${t.is_locked
            ? `<button class="btn btn-g" style="font-size:12px;padding:6px 10px" onclick="openUnlock('${t.id}','${t.name.replace(/'/g,"\\'")}')">解鎖</button>`
            : `<button class="btn btn-r" style="font-size:12px;padding:6px 10px" onclick="lockTenant('${t.id}')">鎖定</button>`}
        </td>
      </tr>
    `).join('');
  } catch(e) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#d94f4f">載入失敗</td></tr>'; }
}

function openApprove(applyId, brandName, email) {
  currentApplyId = applyId;
  document.getElementById('approveInfo').innerHTML = `品牌：<b>${brandName}</b><br>Email：${email}`;
  const autoId = brandName.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 20) + '_' + Date.now().toString().slice(-4);
  document.getElementById('approveTenantId').value = autoId;
  document.getElementById('approveModal').classList.add('show');
}

async function confirmApprove() {
  const tenantId = document.getElementById('approveTenantId').value.trim();
  if (!tenantId) { alert('請填寫 Tenant ID'); return; }
  const res = await apiPost({ action: 'approveApply', apply_id: currentApplyId, tenant_id: tenantId });
  if (res.error) { alert('開通失敗：' + res.error); return; }
  alert('✅ 已成功開通！開通通知已寄出。');
  closeModal('approveModal');
  loadApplyList();
  loadTenants();
}

function openUnlock(tenantId, name) {
  currentTenantId = tenantId;
  document.getElementById('unlockInfo').innerHTML = `確認解鎖 / 續費：<b>${name}</b>`;
  document.getElementById('unlockAmount').value = '';
  document.getElementById('unlockTax').value = '';
  document.getElementById('unlockNote').value = '';
  document.getElementById('unlockModal').classList.add('show');
}

async function confirmUnlock() {
  const amount = Number(document.getElementById('unlockAmount').value) || 0;
  const tax = Number(document.getElementById('unlockTax').value) || 0;
  const note = document.getElementById('unlockNote').value.trim();
  const res = await apiPost({ action: 'unlockTenant', tenant_id: currentTenantId, amount, tax, note });
  if (res.error) { alert('解鎖失敗：' + res.error); return; }
  alert('✅ 已解鎖！帳號恢復正常，通知已寄出。');
  closeModal('unlockModal');
  loadTenants();
}

async function lockTenant(tenantId) {
  if (!confirm('確定要鎖定此租戶嗎？鎖定後客戶將無法使用功能。')) return;
  const reason = prompt('請填寫鎖定原因：', '試用期已結束，請續費');
  if (!reason) return;
  const res = await apiPost({ action: 'lockTenant', tenant_id: tenantId, reason });
  if (res.error) { alert('鎖定失敗：' + res.error); return; }
  alert('✅ 已鎖定');
  loadTenants();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// 初始化
(function() {
  handleCallback();
  const s = JSON.parse(localStorage.getItem('manage_session') || 'null');
  if (s && s.token) {
    ST.token = s.token;
    ST.email = s.email;
    showMain(s.name || s.email);
  }
})();
</script>
</body>
</html>
