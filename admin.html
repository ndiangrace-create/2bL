dient(90deg,#fff 0%,#fff 55%,rgba(217,229,238,.45) 100%)}.session-name{font-size:22px;font-weight:950;line-height:1.25}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:#F4F0EA;border:1px solid var(--line);font-size:13px;font-weight:850}.pill.blue{background:var(--blue)}.pill.green{background:var(--green)}.pill.yellow{background:var(--yellow)}.pill.pink{background:var(--pink)}.pill.purple{background:var(--purple)}.session-body{padding:14px 16px 16px}.section-label{font-size:14px;font-weight:950;color:#333;margin:6px 0 8px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.stat{border:1px solid var(--line);border-radius:17px;padding:10px;background:#fff;min-height:78px;text-align:center;display:flex;flex-direction:column;justify-content:center}.stat.click:hover{border-color:#9EB9B4;box-shadow:0 8px 20px rgba(0,0,0,.08);transform:translateY(-1px)}.stat b{font-size:24px;line-height:1;font-weight:950}.stat span{font-size:13px;color:var(--muted);font-weight:850;margin-top:5px}.stat.blue{background:rgba(217,229,238,.55)}.stat.green{background:rgba(221,234,209,.7)}.stat.yellow{background:rgba(250,238,199,.75)}.stat.pink{background:rgba(250,225,221,.75)}.stat.purple{background:rgba(220,215,237,.70)}.compact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.info-box{border:1px solid var(--line);background:#fff;border-radius:17px;padding:12px;min-height:86px}.info-line{display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px dashed #EEE4D8;padding:7px 0}.info-line:last-child{border-bottom:0}.info-line span:first-child{color:var(--muted);font-weight:850}.info-line span:last-child{font-weight:950;text-align:right}.card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}.panel.show{display:flex}.panel-head{position:sticky;top:0;background:rgba(248,246,240,.95);backdrop-filter:blur(12px);z-index:2;border-bottom:1px solid var(--line);padding:10px 12px}.panel-head-in{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-title{font-size:20px;font-weight:950}.panel-sub{font-size:12px;color:var(--muted)}.xbtn{width:44px;height:44px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:20px;font-weight:950}.panel-body{flex:1;overflow:auto;padding:14px 14px calc(92px + var(--safe-bottom));max-width:1180px;width:100%;margin:0 auto}.panel-bottom{position:sticky;bottom:0;background:rgba(248,246,240,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px calc(10px + var(--safe-bottom));display:flex;gap:8px;justify-content:center}.reg-card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px}.reg-title{font-size:20px;font-weight:950}.reg-sub{font-size:13px;color:var(--muted);margin-top:2px}.kv{display:grid;grid-template-columns:92px 1fr;gap:4px 10px;margin-top:10px;font-size:14px}.kv .k{color:var(--muted);font-weight:850}.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.tag{border-radius:999px;background:#F4F0EA;border:1px solid var(--line);padding:4px 8px;font-size:12px;font-weight:900;text-decoration:none}.tag.ok{background:var(--green)}.tag.warn{background:var(--yellow)}.tag.bad{background:var(--pink)}.tag.info{background:var(--blue)}.tag.purple{background:var(--purple)}.reg-actions{display:flex;flex-direction:column;gap:7px;min-width:112px}.empty,.loading{background:#fff;border:1px dashed var(--line);border-radius:20px;padding:24px;text-align:center;color:var(--muted);font-weight:850}.settings-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.settings-tile{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;text-align:center;box-shadow:var(--shadow);min-height:110px}.settings-tile .ico{font-size:28px}.settings-tile b{display:block;margin-top:6px}.settings-tile span{display:block;margin-top:2px;color:var(--muted);font-size:12px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-field{display:flex;flex-direction:column;gap:5px}.form-field.full{grid-column:1/-1}.form-field label{font-size:13px;color:var(--muted);font-weight:900}.form-field input,.form-field select,.form-field textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 12px}.form-field textarea{min-height:110px;resize:vertical}.toast{position:fixed;left:50%;bottom:calc(92px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);background:#1f1f1f;color:#fff;padding:11px 15px;border-radius:999px;font-weight:850;box-shadow:var(--shadow2);opacity:0;pointer-events:none;transition:.22s;z-index:300;max-width:92vw;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.table-wrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:18px}.mini-table{border-collapse:collapse;width:100%;min-width:720px}.mini-table th,.mini-table td{border-bottom:1px solid #EFE6DC;padding:9px 10px;text-align:left;font-size:14px}.mini-table th{background:#FBF8F1;font-weight:950}@media(max-width:860px){html,body{font-size:16px}.app{padding:10px 10px calc(104px + var(--safe-bottom))}.brand-title{font-size:17px}.brand-sub{max-width:44vw}.hide-sm{display:none}.tabs{bottom:8px;width:calc(100vw - 16px);border-radius:22px;padding:7px}.tab{font-size:13px;min-height:44px;border-radius:16px}.page-title{display:block}.page-actions{margin-top:10px;justify-content:flex-start}.session-head{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.compact-grid{grid-template-columns:1fr}.reg-card{grid-template-columns:1fr}.reg-actions{flex-direction:row;flex-wrap:wrap}.reg-actions .btn{flex:1 1 auto}.settings-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}.kv{grid-template-columns:82px 1fr}.card-actions .btn{flex:1 1 calc(50% - 8px)}}@media(max-width:430px){.stats{grid-template-columns:repeat(2,1fr)}.settings-grid{grid-template-columns:1fr}.card-actions .btn{flex:1 1 100%}}
</style>
</head>
<body>
<section id="loginPage" class="login-wrap">
  <div class="login-card">
    <img class="login-mark" src="https://raw.githubusercontent.com/ndiangrace-create/2bL/main/logo.jpg" alt="2BL 報名管理系統 Logo" />
    <h1>2BL 報名管理系統</h1>
    <div class="sub">活動報名｜審核繳費｜場次管理｜現場報到</div>
    <div class="login-info"><b>系統服務資訊</b><br>管理員請使用已授權的 Google 帳號登入。若無法登入或需要開通權限，請聯繫系統服務窗口。</div>
    <button class="btn block" onclick="startGoogleLogin()">使用 Google 登入</button>
    <div id="loginErr" class="notice warn hidden" style="text-align:left"></div>
  </div>
</section>

<section id="adminPage" class="hidden">
  <header class="topbar"><div class="topbar-in">
    <div class="brand"><img class="logo" src="https://raw.githubusercontent.com/ndiangrace-create/2bL/main/logo.jpg" alt="2BL"><div><div class="brand-title">2BL 報名管理系統</div><div id="whoText" class="brand-sub">尚未登入</div></div></div>
    <div class="actions"><button class="btn secondary small hide-sm" onclick="refreshCurrentPage()">重新整理</button><button class="btn secondary small" onclick="window.open('onsite.html','_blank')">現場入口</button><button class="btn gray small" onclick="logout()">登出</button></div>
  </div></header>
  <main class="app">
    <nav class="tabs" aria-label="後台主選單">
      <button id="tab-sessions" class="tab active" onclick="switchPage('sessions')">場次</button>
      <button id="tab-todos" class="tab" onclick="switchPage('todos')">待辦</button>
      <button id="tab-members" class="tab" onclick="switchPage('members')">會員</button>
      <button id="tab-settings" class="tab" onclick="switchPage('settings')">設定</button>
    </nav>
    <section id="page-sessions"><div class="page-title"><div><h2>場次總覽 / 場次管理</h2><div class="sub">每一場都是獨立管理卡；點數字直接進入該場名單。</div></div><div class="page-actions"><button class="btn secondary" onclick="refreshSessionsOverview()">重新整理</button><button class="btn" onclick="openSessionCreatePanel()">＋ 新增場次</button></div></div><div class="filter-row"><input id="sessionSearch" placeholder="搜尋場次、系列、合作單位、地點" oninput="renderSessions()"><select id="sessionStatusFilter" onchange="renderSessions()"><option value="current">進行中</option><option value="all">全部</option><option value="archived">封存</option></select></div><div id="sessionList" class="session-list"><div class="loading">載入場次中…</div></div></section>
    <section id="page-todos" class="hidden"><div class="page-title"><div><h2>全部待辦</h2><div class="sub">跨場次快速處理中心；每張卡片都顯示場次名稱。</div></div><div class="page-actions"><button class="btn secondary" onclick="loadTodos()">重新整理</button></div></div><div id="todoList" class="cards"><div class="loading">載入待辦中…</div></div></section>
    <section id="page-members" class="hidden"><div class="page-title"><div><h2>會員 / 品牌</h2><div class="sub">查品牌、會員與歷史報名；每場狀態獨立。</div></div><div class="page-actions"><button class="btn secondary" onclick="loadMembers()">重新整理</button></div></div><div class="filter-row"><input id="memberSearch" placeholder="搜尋品牌、姓名、手機、Email、FB、IG" oninput="renderMembers()"></div><div id="memberList" class="member-list"><div class="loading">載入會員中…</div></div></section>
    <section id="page-settings" class="hidden"><div class="page-title"><div><h2>系統設定</h2><div class="sub">設定以全螢幕彈窗開啟，不在主畫面堆內容。</div></div></div><div class="settings-grid"><button class="settings-tile" onclick="openEmailTemplates()"><div class="ico">✉️</div><b>信件模板</b><span>正式模板管理</span></button><button class="settings-tile" onclick="openPaymentSettings()"><div class="ico">💳</div><b>付款資訊</b><span>銀行 / LINE Pay / 刷卡</span></button><button class="settings-tile" onclick="openAgreementSettings()"><div class="ico">📋</div><b>合約管理</b><span>三個模板可存</span></button><button class="settings-tile" onclick="openStaffSettings()"><div class="ico">🔐</div><b>權限管理</b><span>系列 / 指定場次</span></button><button class="settings-tile" onclick="openCompanySettings()"><div class="ico">🏷️</div><b>公司資料</b><span>登入頁 / 服務資訊</span></button><button class="settings-tile" onclick="openHomepageSettings()"><div class="ico">🏠</div><b>首頁顯示</b><span>公告 / 封面 / LINE</span></button></div></section>
  </main>
</section>

<section id="panel" class="panel" role="dialog" aria-modal="true"><div class="panel-head"><div class="panel-head-in"><div><div id="panelTitle" class="panel-title">彈窗</div><div id="panelSub" class="panel-sub"></div></div><button class="xbtn" onclick="panelBack()" aria-label="關閉">×</button></div></div><div id="panelBody" class="panel-body"></div><div class="panel-bottom"><button class="btn secondary" onclick="panelBack()">← 返回上一頁</button><button id="panelRootBtn" class="btn secondary hidden" onclick="closeAllPanels()">回場次總覽</button></div></section>
<div id="toast" class="toast"></div>

<script>
'use strict';
const API = 'https://2bl-v7.ndiangrace.workers.dev';
const TENANT_KEY = '2bl_tenant';
const SESSION_KEY = 'tb_v3';
const AdminState = { tenantId:'', email:'', token:'', role:'', name:'', currentPage:'sessions', currentSessionId:null, currentLayer:'root', currentFilter:null, sessions:[], currentSessionDetail:null, currentList:[], members:[], settings:{}, events:[], panelStack:[] };
const $ = id => document.getElementById(id);
const urlParams = new URLSearchParams(location.search);
(function initUrl(){ const t=urlParams.get('tenant')||urlParams.get('tenantId'); const tok=urlParams.get('admin_token'); const err=urlParams.get('login_error'); if(t) sessionStorage.setItem(TENANT_KEY,t); if(tok) sessionStorage.setItem('2bl_admin_token_pending',tok); if(err) sessionStorage.setItem('2bl_login_error_pending',err); if(t||tok||err) history.replaceState({},'',location.pathname+(t?'?tenant='+encodeURIComponent(t):'')); })();
AdminState.tenantId = sessionStorage.getItem(TENANT_KEY)||urlParams.get('tenant')||urlParams.get('tenantId')||'';
function endpoint(){return API.replace(/\/+$/,'');}
function safe(v){return String(v ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function attr(v){return safe(v).replace(/`/g,'&#96;');}
function money(v){ if(v===undefined||v===null||v==='') return '資料庫未提供'; const n=Number(v); if(Number.isNaN(n)) return safe(v); return 'NT$ '+n.toLocaleString('zh-TW'); }
function num(v){ return (v===undefined||v===null||v==='') ? '—' : safe(v); }
function toast(msg,dur=2600){const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._timer); toast._timer=setTimeout(()=>t.classList.remove('show'),dur);}
function unwrap(j){ if(Array.isArray(j)) return j; if(j && Array.isArray(j.data)) return j.data; if(j && j.data !== undefined) return j.data; return j; }
function activeTenant(){ return AdminState.tenantId || 'tuibile'; }
async function api(params={}){ const p={...params,tenant:params.tenant||activeTenant(),email:params.email||AdminState.email||'_',token:params.token||AdminState.token||'',_t:Date.now()}; const qs=new URLSearchParams(); for(const k in p){ const v=p[k]; if(v!==undefined&&v!==null) qs.set(k, typeof v==='object'?JSON.stringify(v):String(v)); } const r=await fetch(API+'?'+qs.toString(),{cache:'no-store'}); const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'})); if(!r.ok||j.error) throw new Error(j.error||j.message||('連線失敗 '+r.status)); return unwrap(j); }
async function apiPost(body={}){ const r=await fetch(API+'?_t='+Date.now(),{method:'POST',headers:{'Content-Type':'application/json;charset=utf-8','Cache-Control':'no-store'},cache:'no-store',body:JSON.stringify({...body,tenant:body.tenant||activeTenant(),email:body.email||AdminState.email,token:body.token||AdminState.token})}); const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'})); if(!r.ok||j.error) throw new Error(j.error||j.message||('連線失敗 '+r.status)); return unwrap(j); }
function startGoogleLogin(){ const t=activeTenant(); if(!t){showLoginError('網址缺少 tenant，無法登入');return;} location.href=endpoint()+'/auth/google/start?tenant='+encodeURIComponent(t); }
async function handleOAuthCallback(){ const token=sessionStorage.getItem('2bl_admin_token_pending'); const loginError=sessionStorage.getItem('2bl_login_error_pending'); sessionStorage.removeItem('2bl_admin_token_pending'); sessionStorage.removeItem('2bl_login_error_pending'); if(loginError){showLoginError({not_authorized:'您的 Google 帳號不在管理員名單內',staff_inactive:'此管理員帳號已停用',id_token_verify_failed:'Google 身份驗證失敗',google_cancelled:'Google 登入已取消',token_exchange_failed:'Google 登入流程錯誤'}[loginError]||('登入失敗：'+loginError));return false;} if(!token) return false; try{ const j=await fetch(endpoint()+'/admin/me?email=_&token='+encodeURIComponent(token)+'&_t='+Date.now(),{cache:'no-store'}).then(r=>r.json()); if(j.error||!j.email){showLoginError('無權限登入後台');return false;} AdminState.tenantId=j.tenant_id||activeTenant(); sessionStorage.setItem(TENANT_KEY,AdminState.tenantId); saveSession({email:j.email,token,role:j.role||j.normalized_role||'',name:j.display_name||j.name||j.email,tenantId:AdminState.tenantId}); enterAdmin(); return true; }catch(e){showLoginError('登入驗證失敗：'+e.message);return false;} }
function showLoginError(msg){const e=$('loginErr'); e.textContent=msg; e.classList.remove('hidden');}
function saveSession(s){ localStorage.setItem(SESSION_KEY,JSON.stringify(s)); AdminState.email=s.email; AdminState.token=s.token; AdminState.role=s.role||''; AdminState.name=s.name||s.email; if(s.tenantId) AdminState.tenantId=s.tenantId; }
function readSession(){ try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch(e){return null} }
function logout(){ if(AdminState.email&&AdminState.token) apiPost({action:'adminLogout'}).catch(()=>{}); localStorage.removeItem(SESSION_KEY); location.reload(); }
async function enterAdmin(){ $('loginPage').classList.add('hidden'); $('adminPage').classList.remove('hidden'); $('whoText').textContent=(AdminState.name||AdminState.email)+'｜'+(AdminState.role||'管理員'); await refreshSessionsOverview(); }
function switchPage(page){ AdminState.currentPage=page; ['sessions','todos','members','settings'].forEach(p=>{ $('page-'+p).classList.toggle('hidden',p!==page); $('tab-'+p).classList.toggle('active',p===page); }); if(page==='sessions') renderSessions(); if(page==='todos') loadTodos(); if(page==='members') loadMembers(); }
async function refreshCurrentPage(){ if(AdminState.currentLayer !== 'root' && AdminState.currentSessionId){ await refreshCurrentSessionOnly(); return; } if(AdminState.currentPage==='sessions') await refreshSessionsOverview(); if(AdminState.currentPage==='todos') await loadTodos(); if(AdminState.currentPage==='members') await loadMembers(); }
function sessionId(s){return String(s.id||s.sessionId||s.session_id||'');}
function sessionName(s){return s.name||s.title||s.sessionName||'未命名場次';}
function sessionById(id){ for(const s of AdminState.sessions){ if(sessionId(s)===String(id)) return s; } return {}; }
function isArchived(s){ return ['封存','隱藏','已封存'].includes(String(s.status||'')); }
function isClosed(s){ return ['關閉','已關閉','停用','已截止'].includes(String(s.status||'')); }
function formatDate(s){ if(s.dateText) return s.dateText; if(s.date) return String(s.date); if(Array.isArray(s.dates)){ const arr=[]; for(const d of s.dates){ arr.push(typeof d==='object' ? (d.date||'') : d); } return arr.join('、')||'未設定日期'; } return '未設定日期'; }
function textFromMap(v){ if(v===undefined||v===null||v==='') return '資料庫未提供'; if(typeof v === 'string') return safe(v); const parts=[]; for(const k in v){ if(Number(v[k])>0) parts.push(safe(k)+'×'+safe(v[k])); } return parts.join('、') || '無'; }
function nz(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
function getStats(s){ const st=s.stats||{}; return { total: nz(st.registrationTotal ?? s.registrationTotal ?? s.total), pending: nz(st.pendingReview ?? s.pendingReview ?? s.pending), approved: nz(st.approved ?? s.approved), unpaid: nz(st.unpaid ?? s.unpaid), paymentPending: nz(st.paymentPending ?? s.paymentPending ?? s.pendingPayment), paid: nz(st.paid ?? s.paid), checked: nz(st.checkedIn ?? s.checkedIn ?? s.seated), refund: nz(st.refund ?? s.refund ?? s.refundReq) }; }
function getFinance(s){ const f=s.finance||{}; return {deposit:nz(f.depositTotal ?? s.depositTotal), receivable:nz(f.receivableTotal ?? s.receivableTotal ?? s.invoiceTotal), received:nz(f.receivedTotal ?? s.receivedTotal ?? s.revenue), unreceived:nz(f.unreceivedTotal ?? s.unreceivedTotal)}; }
function getEquip(s){ const e=s.equipment||{}; return {need:e.approvedNeededText ?? textFromMap(s.equipNeed), all:e.allRequestedText ?? textFromMap(s.equipAll)}; }
async function refreshSessionsOverview(){ AdminState.currentSessionId=null; AdminState.currentLayer='root'; AdminState.currentFilter=null; try{ toast('場次載入中…'); const rows=await api({action:'getSessionDashboard'}); AdminState.sessions = Array.isArray(rows) ? rows : []; renderSessions(); toast('場次已更新'); }catch(e){ $('sessionList').innerHTML='<div class="empty">場次載入失敗：'+safe(e.message)+'</div>'; } }
function renderSessions(){ const box=$('sessionList'); const kw=($('sessionSearch')?.value||'').trim().toLowerCase(); const mode=$('sessionStatusFilter')?.value||'current'; const list=[]; for(const s of AdminState.sessions){ if(mode==='current' && isArchived(s)) continue; if(mode==='archived' && !isArchived(s)) continue; if(kw && ![sessionName(s),s.eventName,s.organizer,s.coorg,s.venue,s.location,s.type].join(' ').toLowerCase().includes(kw)) continue; list.push(s); } if(!list.length){box.innerHTML='<div class="empty">目前沒有符合條件的場次</div>';return;} let out=''; for(const s of list) out += renderSessionCard(s); box.innerHTML=out; }
function statButton(label,value,kind,sid,filter){ const disabled = value===undefined || value===null || value===''; const shown = disabled ? '—' : safe(value); return '<button class="stat click '+kind+'" onclick="openSessionList(\''+attr(sid)+'\',\''+attr(filter)+'\',\''+attr(label)+'\')"><b>'+shown+'</b><span>'+safe(label)+'</span></button>'; }
function renderSessionCard(s){ const sid=sessionId(s), st=getStats(s), f=getFinance(s), e=getEquip(s); return '<article class="session-card" id="session-'+attr(sid)+'"><div class="session-head"><div><div class="session-name">'+safe(sessionName(s))+'</div><div class="meta"><span class="pill blue">'+safe(formatDate(s))+'</span><span class="pill green">'+safe(s.venue||s.location||'未填地點')+'</span><span class="pill yellow">系列：'+safe(s.eventName||s.seriesName||'未設定')+'</span><span class="pill purple">合作：'+safe(s.organizer||s.coorg||'未填')+'</span><span class="pill '+(isClosed(s)?'pink':'green')+'">'+safe(s.status||'報名中')+'</span></div></div><div class="card-actions" style="margin-top:0;justify-content:flex-end"><button class="btn secondary small" onclick="openSessionDetail(\''+attr(sid)+'\')">看明細</button><button class="btn secondary small" onclick="openSessionSettings(\''+attr(sid)+'\')">場次設定</button><button class="btn small" onclick="downloadSessionExcel(\''+attr(sid)+'\')">下載 Excel</button></div></div><div class="session-body"><div class="section-label">本場進度</div><div class="stats">'+statButton('報名',st.total,'blue',sid,'all')+statButton('待審核',st.pending,'yellow',sid,'pending')+statButton('已錄取',st.approved,'green',sid,'approved')+statButton('未繳費',st.unpaid,'pink',sid,'unpaid')+statButton('付款待確認',st.paymentPending,'yellow',sid,'paymentPending')+statButton('已繳費',st.paid,'green',sid,'paid')+statButton('已報到',st.checked,'purple',sid,'checked')+statButton('退款',st.refund,'pink',sid,'refund')+'</div><div style="height:10px"></div><div class="compact-grid"><div class="info-box"><div class="section-label" style="margin-top:0">設備 / 押金</div><div class="info-line"><span>已錄取需訂設備</span><span>'+safe(e.need)+'</span></div><div class="info-line"><span>全部報名設備</span><span>'+safe(e.all)+'</span></div><div class="info-line"><span>押金合計</span><span>'+money(f.deposit)+'</span></div></div><div class="info-box"><div class="section-label" style="margin-top:0">財務概況</div><div class="info-line"><span>應收</span><span>'+money(f.receivable)+'</span></div><div class="info-line"><span>已收</span><span>'+money(f.received)+'</span></div><div class="info-line"><span>未收</span><span>'+money(f.unreceived)+'</span></div></div></div><div class="card-actions"><button class="btn secondary" onclick="openSessionList(\''+attr(sid)+'\',\'all\',\'全部名單\')">全部名單</button><button class="btn secondary" onclick="openEquipmentPanel(\''+attr(sid)+'\')">設備明細</button><button class="btn secondary" onclick="openFinancePanel(\''+attr(sid)+'\')">財務明細</button><button class="btn secondary" onclick="openSessionList(\''+attr(sid)+'\',\'checkin\',\'後台報到\')">後台報到</button></div></div></article>'; }
function openPanel(title,sub,html,opts={}){ const p=$('panel'); if(p.classList.contains('show')&&!opts.replace){ AdminState.panelStack.push({title:$('panelTitle').textContent,sub:$('panelSub').textContent,html:$('panelBody').innerHTML,layer:AdminState.currentLayer,sessionId:AdminState.currentSessionId,filter:AdminState.currentFilter}); } $('panelTitle').textContent=title; $('panelSub').textContent=sub||''; $('panelBody').innerHTML=html; $('panelRootBtn').classList.toggle('hidden',AdminState.currentLayer==='root'); p.classList.add('show'); document.body.style.overflow='hidden'; history.pushState({panel:true},''); }
function panelBack(){ const prev=AdminState.panelStack.pop(); if(prev){ $('panelTitle').textContent=prev.title; $('panelSub').textContent=prev.sub; $('panelBody').innerHTML=prev.html; AdminState.currentLayer=prev.layer; AdminState.currentSessionId=prev.sessionId; AdminState.currentFilter=prev.filter; return; } closeAllPanels(); }
function closeAllPanels(){ $('panel').classList.remove('show'); $('panelBody').innerHTML=''; document.body.style.overflow=''; AdminState.panelStack=[]; AdminState.currentSessionId=null; AdminState.currentLayer='root'; AdminState.currentFilter=null; }
window.addEventListener('popstate',()=>{ if($('panel').classList.contains('show')) panelBack(); });
function isRefundLikeText(v){ const s=String(v||''); return s.includes('退費')||s.includes('退款')||s.includes('refund'); }
function isRegActiveForList(reg){ const review=String(reg.reviewStatus||reg.status||''); const pay=String(reg.paymentStatus||reg.payStatus||''); const refund=String(reg.transferStatus||reg.refundStatus||''); if(['已取消','不錄取','未錄取'].includes(review)) return false; if(pay==='已退費'||pay==='已退款') return false; if(isRefundLikeText(refund)) return false; return true; }
function filterReg(reg,filter){ const review=String(reg.reviewStatus||reg.status||''); const pay=String(reg.paymentStatus||reg.payStatus||''); const check=String(reg.checkinStatus||reg.checkin||''); const refund=String(reg.transferStatus||reg.refundStatus||''); if(filter==='all') return isRegActiveForList(reg); if(filter==='pending') return isRegActiveForList(reg)&&(review.includes('待審')||review==='報名成功'||review===''); if(filter==='approved') return isRegActiveForList(reg)&&review==='已錄取'; if(filter==='unpaid') return isRegActiveForList(reg)&&review==='已錄取'&&(pay.includes('未繳')||pay===''); if(filter==='paymentPending') return isRegActiveForList(reg)&&review==='已錄取'&&(pay.includes('待確認')||pay.includes('回報')); if(filter==='paid') return isRegActiveForList(reg)&&review==='已錄取'&&(pay.includes('已繳')||pay.includes('已付款')||pay.includes('免費')); if(filter==='checked') return isRegActiveForList(reg)&&check.includes('已報到'); if(filter==='refund') return isRefundLikeText(refund)||pay==='已退費'||pay==='已退款'; if(filter==='equipment') return isRegActiveForList(reg)&&regEquipText(reg)!=='無'; if(filter==='checkin') return isRegActiveForList(reg); return true; }
async function openSessionList(sid,filter,label){ AdminState.currentSessionId=sid; AdminState.currentLayer='sessionList'; AdminState.currentFilter=filter; const s=sessionById(sid); openPanel(sessionName(s)+'｜'+label,'本頁已鎖定 sessionId：'+sid,'<div class="loading">名單載入中…</div>',{replace:true}); try{ const rows=await api({action:'getSessionRegistrations',sessionId:sid,filter}); const list=[]; for(const r of (Array.isArray(rows)?rows:[])){ if(filterReg(r,filter)) list.push(r); } AdminState.currentList=list; $('panelBody').innerHTML='<div class="filter-row"><input id="panelSearch" placeholder="搜尋品牌、姓名、手機、Email" oninput="renderRegistrationCards()"><select id="panelSort" onchange="renderRegistrationCards()"><option value="new">最新報名</option><option value="brand">品牌名稱</option></select><button class="btn secondary" onclick="downloadSessionExcel(\''+attr(sid)+'\')">下載本場 Excel</button></div><div id="panelCards" class="cards"></div>'; renderRegistrationCards(); }catch(e){ $('panelBody').innerHTML='<div class="empty">名單載入失敗：'+safe(e.message)+'</div>'; } }
async function openEquipmentPanel(sid){ AdminState.currentSessionId=sid; AdminState.currentLayer='equipment'; const s=sessionById(sid); openPanel(sessionName(s)+'｜設備明細','本頁只顯示設備統計與有設備需求的報名，不顯示全部名單','<div class="loading">設備明細載入中…</div>',{replace:true}); try{ const data=await api({action:'getSessionEquipmentDetails',sessionId:sid}); const summary=data.summary||{}; const rows=Array.isArray(data.rows)?data.rows:[]; let html='<div class="compact-grid"><div class="info-box"><div class="section-label" style="margin-top:0">設備統計</div><div class="info-line"><span>已錄取需訂設備</span><span>'+safe(summary.approvedNeededText||'無')+'</span></div><div class="info-line"><span>已繳費需訂設備</span><span>'+safe(summary.paidNeededText||'無')+'</span></div><div class="info-line"><span>全部報名設備</span><span>'+safe(summary.allRequestedText||'無')+'</span></div></div></div><div style="height:14px"></div>'; if(!rows.length){ html+='<div class="empty">本場目前沒有設備需求明細</div>'; } else { html+='<div class="cards">'; for(const r of rows){ html+='<article class="reg-card"><div><div class="reg-title">'+safe(r.brand||'未填品牌')+'</div><div class="reg-sub">'+safe(r.reviewStatus||'')+'｜'+safe(r.paymentStatus||'')+'｜'+safe(r.createdAt||'')+'</div><div class="kv"><div class="k">聯絡人</div><div>'+safe(r.name||'—')+'｜'+safe(r.phone||'—')+'</div><div class="k">Email</div><div>'+safe(r.email||'—')+'</div><div class="k">報名日期</div><div>'+safe(r.selectedDatesText||'未設定')+'</div><div class="k">攤位數</div><div>'+num(r.stallCount||1)+'</div><div class="k">設備</div><div>'+safe(r.equipmentText||'無')+'</div></div></div></article>'; } html+='</div>'; } $('panelBody').innerHTML=html; }catch(e){ $('panelBody').innerHTML='<div class="empty">設備明細載入失敗：'+safe(e.message)+'</div>'; } }
function equipText(v){ if(!v) return '無'; if(typeof v === 'string'){ try{v=JSON.parse(v)}catch(e){return v || '無'} } if(typeof v !== 'object') return safe(v); const order={'桌':1,'椅':2,'電力':3}; const norm=k=>String(k||'').replace(/桌子|長桌|摺疊桌|折疊桌/g,'桌').replace(/椅子|椅凳/g,'椅').replace(/用電|插座|電源/g,'電力'); const parts=[]; for(const k in v){ if(Number(v[k])>0) parts.push([norm(k),Number(v[k])]); } parts.sort((a,b)=>(order[a[0]]||99)-(order[b[0]]||99)||a[0].localeCompare(b[0],'zh-Hant')); return parts.map(x=>x[0]+'×'+x[1]).join('、') || '無'; }
function regAmount(r){ const keys=['cashTotal','amount','totalAmount','registrationTotalAmount','registration_total_amount','total_amount']; for(const k of keys){ if(r[k]!==undefined && r[k]!==null && r[k]!=='' && !isNaN(Number(r[k]))) return Number(r[k]); } return ''; }
function regSessionId(r){ return String(r.sessionId||r.session_id||r.sesId||''); }
function regDateText(r){ if(r.selectedDatesText||r.registrationDateText) return r.selectedDatesText||r.registrationDateText; const arr=r.selectedDates||r.selected_dates; if(Array.isArray(arr)&&arr.length) return arr.map(x=>typeof x==='object'?(x.date||x.day||x.start||''):String(x||'')).filter(Boolean).join('、'); const sid=regSessionId(r)||AdminState.currentSessionId; return formatDate(sessionById(sid)); }
function regCreatedText(r){ const v=r.createdAt||r.created_at||''; if(!v) return '未記錄'; try{ return new Date(v).toLocaleString('zh-TW',{hour12:false}); }catch(e){ return String(v); } }
function regEquipText(r){ return r.equipmentText || r.effectiveEquipmentText || equipText(r.equipmentMap||r.equipment||r.equip||r.equipment_json); }
function invoiceBrief(r){ const parts=[]; if(r.taxId) parts.push('統編 '+r.taxId); if(r.invoiceTitle) parts.push(r.invoiceTitle); if(r.invoiceEmail) parts.push(r.invoiceEmail); return parts.join('｜') || '—'; }
function renderRegistrationCards(){ const box=$('panelCards'); if(!box) return; const kw=($('panelSearch')?.value||'').toLowerCase(); const sort=$('panelSort')?.value||'new'; const list=[]; for(const r of AdminState.currentList){ if(kw && ![r.brand,r.brandName,r.brand_name,r.name,r.phone,r.email,r.fb,r.ig].join(' ').toLowerCase().includes(kw)) continue; list.push(r); } if(sort==='brand') list.sort((a,b)=>String(a.brand||a.brandName||a.brand_name||'').localeCompare(String(b.brand||b.brandName||b.brand_name||''),'zh-Hant')); else list.sort((a,b)=>String(b.createdAt||b.created_at||'').localeCompare(String(a.createdAt||a.created_at||''))); let out=''; for(const r of list) out += renderRegCard(r); box.innerHTML=out || '<div class="empty">沒有符合條件的名單</div>'; }
function statusTags(r){ const review=r.reviewStatus||r.status||'待審核'; const pay=r.paymentStatus||r.payStatus||'未繳費'; const check=r.checkinStatus||r.checkin||'未報到'; return '<span class="tag '+(String(review).includes('錄取')?'ok':String(review).includes('待')?'warn':'info')+'">審核：'+safe(review)+'</span><span class="tag '+(String(pay).includes('已繳')||String(pay).includes('免費')?'ok':String(pay).includes('回報')||String(pay).includes('待確認')?'warn':'bad')+'">付款：'+safe(pay)+'</span><span class="tag '+(String(check).includes('已報到')?'ok':'purple')+'">報到：'+safe(check)+'</span>'; }
function socialLinks(r){ let out=''; if(r.fb) out+='<a class="tag info" href="'+attr(r.fb)+'" target="_blank">FB</a>'; if(r.ig) out+='<a class="tag bad" href="'+attr(r.ig)+'" target="_blank">IG</a>'; return out || '<span class="tag">未填社群</span>'; }
function actionButtons(r){ const id=r.id||r.regId||''; if(Array.isArray(r.availableActions)){ let out=''; for(const a of r.availableActions) out += actionButton(id,a); return out || '<span class="tag">目前無可操作動作</span>'; } return '<span class="tag warn">後端未回傳可操作按鈕，已阻斷前端自行判斷</span><button class="btn small secondary" onclick="openRegDetail(\''+attr(id)+'\')">完整資料</button>'; }
function actionButton(id,a){ const m={approve:'錄取',reject:'不錄取',waitlist:'備取',markPaymentReported:'已回報',confirmPayment:'確認付款',markUnpaid:'未繳費',cancelUnpaid:'未繳費取消',checkin:'報到',undoCheckin:'取消報到',refund:'退費'}; return '<button class="btn small secondary" onclick="runRegAction(\''+attr(id)+'\',\''+attr(a)+'\',this)">'+safe(m[a]||a)+'</button>'; }
function renderRegCard(r){ const brand=r.brand||r.brandName||r.brand_name||'未填品牌'; const sid=regSessionId(r)||AdminState.currentSessionId; const s=sessionById(sid); const dateText=regDateText(r); const createdText=regCreatedText(r); const eq=regEquipText(r); return '<article class="reg-card"><div><div class="reg-title">'+safe(brand)+'</div><div class="reg-sub">'+safe(r.sessionName||sessionName(s))+'｜報名日期：'+safe(dateText||'未設定')+'</div><div class="tag-row">'+statusTags(r)+socialLinks(r)+'</div><div class="kv"><div class="k">報名日期</div><div>'+safe(dateText||'未設定')+'</div><div class="k">送出時間</div><div>'+safe(createdText)+'</div><div class="k">聯絡人</div><div>'+safe(r.name||'—')+'｜'+safe(r.phone||'—')+'</div><div class="k">Email</div><div>'+safe(r.email||'—')+'</div><div class="k">攤位數</div><div>'+num(r.stallCount||r.stall_count||1)+'</div><div class="k">設備</div><div>'+safe(eq)+'</div><div class="k">金額</div><div>'+money(regAmount(r))+'</div><div class="k">發票</div><div>'+safe(invoiceBrief(r))+'</div><div class="k">備註</div><div>'+safe(r.adminNote||r.admin_note||r.remark||'—')+'</div></div></div><div class="reg-actions">'+actionButtons(r)+'</div></article>'; }
async function runRegAction(regId,regAction,btn){ if(!AdminState.currentSessionId && !['todos'].includes(AdminState.currentLayer)){ toast('缺少場次鎖定，已阻斷操作',5000); return; } if(!regId){toast('找不到報名 ID');return;} const question={reject:'確定標記為不錄取？',waitlist:'確定標記為備取？',confirmPayment:'確定確認付款？',cancelUnpaid:'確定取消未繳費報名？',refund:'確定處理退費？'}[regAction]; if(question && !confirm(question)) return; const old=btn.textContent; btn.disabled=true; btn.textContent='處理中…'; try{ if(regAction==='approve') await apiPost({action:'approveReg',regId,approved:true,sessionId:AdminState.currentSessionId}); else if(regAction==='reject') await apiPost({action:'approveReg',regId,approved:false,sessionId:AdminState.currentSessionId}); else if(regAction==='waitlist') await apiPost({action:'approveReg',regId,status:'備取',sessionId:AdminState.currentSessionId}); else if(regAction==='markPaymentReported') await apiPost({action:'markPaymentScreenshot',regId,sessionId:AdminState.currentSessionId}); else if(regAction==='confirmPayment') await apiPost({action:'confirmPayment',regId,sessionId:AdminState.currentSessionId}); else if(regAction==='checkin') await apiPost({action:'checkin',regId,sessionId:AdminState.currentSessionId}); else if(regAction==='undoCheckin') await apiPost({action:'checkin',regId,undo:true,sessionId:AdminState.currentSessionId}); else if(regAction==='cancelUnpaid') await apiPost({action:'adminCancelReg',regId,sessionId:AdminState.currentSessionId}); else await apiPost({action:'updateRegistrationAction',regId,regAction,sessionId:AdminState.currentSessionId}); toast('已更新'); await refreshCurrentSessionOnly(); }catch(e){ toast('操作失敗：'+e.message,6000); }finally{ btn.disabled=false; btn.textContent=old; } }
async function refreshCurrentSessionOnly(){ const sid=AdminState.currentSessionId; if(!sid) return; try{ const rows=await api({action:'getSessionDashboard',sessionId:sid}); if(Array.isArray(rows) && rows[0]){ let replaced=false; for(let i=0;i<AdminState.sessions.length;i++){ if(sessionId(AdminState.sessions[i])===sid){ AdminState.sessions[i]=rows[0]; replaced=true; } } if(!replaced) AdminState.sessions.push(rows[0]); } if(AdminState.currentLayer==='sessionList') await openSessionList(sid,AdminState.currentFilter,$('panelTitle').textContent.split('｜').pop()||'名單'); renderSessions(); }catch(e){toast('刷新本場失敗：'+e.message,6000);} }
function openRegDetail(id){ let r=null; for(const x of AdminState.currentList){ if(String(x.id||x.regId)===String(id)) r=x; } if(!r){toast('找不到資料');return;} openPanel('完整資料｜'+safe(r.brand||r.brandName||r.brand_name||'品牌'),'底部返回可回上一層','<details class="info-box" open><summary style="font-weight:950;cursor:pointer">資料庫回傳原始資料</summary><pre style="white-space:pre-wrap;font-size:13px">'+safe(JSON.stringify(r,null,2))+'</pre></details>'); }
async function openSessionDetail(sid){ AdminState.currentSessionId=sid; AdminState.currentLayer='sessionDetail'; const s=sessionById(sid); openPanel(sessionName(s)+'｜看明細','單場總明細，不是名單','<div class="loading">載入中…</div>'); try{ const rows=await api({action:'getSessionDashboard',sessionId:sid}); const d=Array.isArray(rows)?rows[0]:rows; const st=getStats(d||s), f=getFinance(d||s), e=getEquip(d||s); $('panelBody').innerHTML='<div class="stats">'+statButton('報名',st.total,'blue',sid,'all')+statButton('待審核',st.pending,'yellow',sid,'pending')+statButton('已錄取',st.approved,'green',sid,'approved')+statButton('付款待確認',st.paymentPending,'yellow',sid,'paymentPending')+statButton('已繳費',st.paid,'green',sid,'paid')+statButton('已報到',st.checked,'purple',sid,'checked')+'</div><div style="height:14px"></div><div class="compact-grid"><div class="info-box"><div class="section-label">設備</div><div class="info-line"><span>已錄取需訂設備</span><span>'+safe(e.need)+'</span></div><div class="info-line"><span>全部報名設備</span><span>'+safe(e.all)+'</span></div></div><div class="info-box"><div class="section-label">財務</div><div class="info-line"><span>押金</span><span>'+money(f.deposit)+'</span></div><div class="info-line"><span>應收</span><span>'+money(f.receivable)+'</span></div><div class="info-line"><span>已收</span><span>'+money(f.received)+'</span></div><div class="info-line"><span>未收</span><span>'+money(f.unreceived)+'</span></div></div></div><div class="card-actions"><button class="btn" onclick="downloadSessionExcel(\''+attr(sid)+'\')">下載完整 Excel</button></div>'; }catch(e){$('panelBody').innerHTML='<div class="empty">載入失敗：'+safe(e.message)+'</div>';} }
async function openFinancePanel(sid){ AdminState.currentSessionId=sid; AdminState.currentLayer='finance'; const s=sessionById(sid); openPanel(sessionName(s)+'｜財務明細','本場財務與發票資料','<div class="loading">財務載入中…</div>'); try{ const [summaryRows,finance,invoices]=await Promise.all([api({action:'getSessionDashboard',sessionId:sid}).catch(()=>[]),api({action:'getFinance',sessionId:sid}).catch(()=>[]),api({action:'getInvoiceList',sessionId:sid}).catch(()=>[])]); const d=Array.isArray(summaryRows)?summaryRows[0]:summaryRows; const f=getFinance(d||s); $('panelBody').innerHTML='<div class="stats"><div class="stat blue"><b>'+money(f.receivable)+'</b><span>應收</span></div><div class="stat green"><b>'+money(f.received)+'</b><span>已收</span></div><div class="stat pink"><b>'+money(f.unreceived)+'</b><span>未收</span></div><div class="stat purple"><b>'+money(f.deposit)+'</b><span>押金</span></div></div><div style="height:14px"></div><div class="card-actions"><button class="btn" onclick="downloadSessionExcel(\''+attr(sid)+'\')">下載本場完整 Excel</button></div><div style="height:14px"></div><h3>財務項目</h3>'+tableFromRows(finance,['type','name','amount','note'],['類型','名稱','金額','備註'])+'<div style="height:14px"></div><h3>發票資料</h3>'+tableFromRows(invoices,['brand','taxId','invoiceTitle','invoiceEmail','invoiceStatus'],['品牌','統編','抬頭','Email','狀態']); }catch(e){$('panelBody').innerHTML='<div class="empty">財務載入失敗：'+safe(e.message)+'</div>';} }
function tableFromRows(rows,keys,heads){ if(!Array.isArray(rows)||!rows.length) return '<div class="empty">資料庫目前未提供資料</div>'; let h='<div class="table-wrap"><table class="mini-table"><thead><tr>'; for(const x of heads) h+='<th>'+safe(x)+'</th>'; h+='</tr></thead><tbody>'; for(const r of rows){ h+='<tr>'; for(const k of keys){ const v=k==='amount'?money(r[k]):safe(r[k]||''); h+='<td>'+v+'</td>'; } h+='</tr>'; } return h+'</tbody></table></div>'; }
async function openSessionSettings(sid){ AdminState.currentSessionId=sid; AdminState.currentLayer='sessionSettings'; const s=sessionById(sid); openPanel(sessionName(s)+'｜場次設定','儲存時只送本頁欄位；後端必須保留未修改資料','<div class="loading">設定載入中…</div>'); try{ const rows=await api({action:'getSession',sessionId:sid}).catch(()=>null); const d=(Array.isArray(rows)?rows[0]:rows)||s; $('panelBody').innerHTML=sessionSettingsForm(d); }catch(e){$('panelBody').innerHTML=sessionSettingsForm(s)+'<div class="notice warn">完整設定載入失敗：'+safe(e.message)+'</div>'; } }
function sessionSettingsForm(s){ const sid=sessionId(s)||AdminState.currentSessionId; return '<div class="form-grid"><div class="form-field"><label>場次名稱</label><input id="set_name" value="'+attr(sessionName(s))+'"></div><div class="form-field"><label>系列 / 活動</label><input id="set_event" value="'+attr(s.eventName||s.seriesName||'')+'" disabled></div><div class="form-field"><label>地點</label><input id="set_venue" value="'+attr(s.venue||s.location||'')+'"></div><div class="form-field"><label>合作單位</label><input id="set_organizer" value="'+attr(s.organizer||s.coorg||'')+'"></div><div class="form-field"><label>攤位費</label><input id="set_fee" type="number" value="'+attr(s.fee||0)+'"></div><div class="form-field"><label>押金</label><input id="set_deposit" type="number" value="'+attr(s.deposit||0)+'"></div><div class="form-field"><label>報名狀態</label><select id="set_status"><option '+(!isClosed(s)?'selected':'')+'>報名中</option><option '+(isClosed(s)?'selected':'')+'>已關閉</option><option '+(isArchived(s)?'selected':'')+'>封存</option></select></div><div class="form-field"><label>審核制</label><select id="set_review"><option value="1" '+(s.needReview!==false?'selected':'')+'>開啟</option><option value="0" '+(s.needReview===false?'selected':'')+'>關閉</option></select></div><div class="form-field full"><label>日期 / 說明</label><textarea id="set_desc">'+safe(s.desc||s.description||'')+'</textarea></div><div class="form-field full"><label>封面 / 主題圖 URL</label><input id="set_cover" value="'+attr(s.cover||s.coverUrl||s.cover_url||'')+'"></div></div><div class="notice">設備、合約、選位、模組等未在本頁顯示的資料，不會由前端送空值；後端 updateSession 必須保留既有資料。</div><div class="card-actions"><button class="btn" onclick="saveSessionSettings(\''+attr(sid)+'\',this)">儲存本場設定</button></div>'; }
async function saveSessionSettings(sid,btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'updateSession',id:sid,sessionId:sid,name:$('set_name').value.trim(),venue:$('set_venue').value.trim(),organizer:$('set_organizer').value.trim(),fee:$('set_fee').value,deposit:$('set_deposit').value,status:$('set_status').value,needReview:$('set_review').value==='1',desc:$('set_desc').value,cover:$('set_cover').value.trim()}); toast('已儲存場次設定'); await refreshCurrentSessionOnly(); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
async function openSessionCreatePanel(){ openPanel('新增場次','送出後由 Worker / DB 建立正式場次','<div class="form-grid"><div class="form-field"><label>場次名稱</label><input id="new_name"></div><div class="form-field"><label>地點</label><input id="new_venue"></div><div class="form-field"><label>攤位費</label><input id="new_fee" type="number" value="0"></div><div class="form-field"><label>押金</label><input id="new_deposit" type="number" value="0"></div><div class="form-field full"><label>說明</label><textarea id="new_desc"></textarea></div></div><div class="card-actions"><button class="btn" onclick="createSession(this)">建立場次</button></div>'); }
async function createSession(btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='建立中…'; try{ await apiPost({action:'createSession',name:$('new_name').value.trim(),venue:$('new_venue').value.trim(),fee:$('new_fee').value,deposit:$('new_deposit').value,desc:$('new_desc').value}); toast('已建立場次'); closeAllPanels(); await refreshSessionsOverview(); }catch(e){toast('建立失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
async function downloadSessionExcel(sid){ try{ const data=await api({action:'downloadSession',sessionId:sid}); const name=(data.session&&data.session.name)||sessionName(sessionById(sid))||sid; let csv=''; if(data.registrations){ csv += data.registrations.headers.join(',')+'\n'; for(const row of data.registrations.rows){ csv += row.map(csvCell).join(',')+'\n'; } } if(data.finance){ csv+='\n財務明細\n'+data.finance.headers.join(',')+'\n'; for(const row of data.finance.rows){ csv += row.map(csvCell).join(',')+'\n'; } } const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name+'_完整名單.csv'; a.click(); URL.revokeObjectURL(a.href); }catch(e){toast('下載失敗：'+e.message,6000)} }
function csvCell(v){ const s=String(v??''); return '"'+s.replace(/"/g,'""')+'"'; }
async function loadTodos(){ if(AdminState.currentPage!=='todos') return; $('todoList').innerHTML='<div class="loading">載入待辦中…</div>'; try{ const rows=await api({action:'getTodos'}).catch(()=>null); if(Array.isArray(rows)){ renderTodoRows(rows); return; } const all=[]; const wanted=[['pending','待審核'],['paymentPending','付款待確認'],['unpaid','未繳費'],['refund','退款待處理']]; for(const s of AdminState.sessions){ const sid=sessionId(s); for(const x of wanted){ all.push({sessionId:sid,sessionName:sessionName(s),kind:x[0],label:x[1]}); } } renderTodoRows(all); }catch(e){$('todoList').innerHTML='<div class="empty">待辦載入失敗：'+safe(e.message)+'</div>';} }
function renderTodoRows(rows){ let out=''; for(const r of rows){ out+='<article class="reg-card"><div><div class="reg-title">'+safe(r.brandName||r.brand||r.label||'待辦')+'</div><div class="reg-sub">'+safe(r.sessionName||sessionName(sessionById(r.sessionId))||'跨場次')+'</div><div class="tag-row"><span class="tag warn">'+safe(r.label||r.kind||'待處理')+'</span></div></div><div class="reg-actions"><button class="btn small secondary" onclick="openSessionList(\''+attr(r.sessionId||'')+'\',\''+attr(r.kind||'all')+'\',\''+attr(r.label||'待辦')+'\')">查看</button></div></article>'; } $('todoList').innerHTML=out||'<div class="empty">目前沒有待辦</div>'; }
async function loadMembers(){ if(AdminState.currentPage!=='members') return; $('memberList').innerHTML='<div class="loading">載入會員中…</div>'; try{ const rows=await api({action:'getMembers'}).catch(()=>null); if(Array.isArray(rows)){ AdminState.members=rows; renderMembers(); return; } $('memberList').innerHTML='<div class="notice warn">Worker 尚未提供 getMembers，會員頁不使用報名資料假合併，避免誤判。</div>'; }catch(e){$('memberList').innerHTML='<div class="empty">會員載入失敗：'+safe(e.message)+'</div>';} }
function renderMembers(){ const kw=($('memberSearch')?.value||'').toLowerCase(); const list=[]; for(const m of AdminState.members){ if(kw && ![m.brand,m.brandName,m.name,m.phone,m.email,m.fb,m.ig].join(' ').toLowerCase().includes(kw)) continue; list.push(m); } let out=''; for(const m of list){ out+='<article class="reg-card"><div><div class="reg-title">'+safe(m.brand||m.brandName||'未填品牌')+'</div><div class="reg-sub">'+safe(m.name||'')+'｜'+safe(m.phone||'')+'｜'+safe(m.email||'')+'</div><div class="tag-row">'+(m.fb?'<a class="tag info" target="_blank" href="'+attr(m.fb)+'">FB</a>':'')+(m.ig?'<a class="tag bad" target="_blank" href="'+attr(m.ig)+'">IG</a>':'')+'<span class="tag purple">歷史 '+safe(m.historyCount||'—')+' 場</span></div></div><div class="reg-actions"><button class="btn small secondary" onclick="openMemberHistory(\''+attr(m.id||m.email||m.phone||'')+'\')">歷史紀錄</button></div></article>'; } $('memberList').innerHTML=out||'<div class="empty">沒有會員 / 品牌資料</div>'; }

async function saveStaffScope(email,btn){ const ses=[]; document.querySelectorAll('.scope_ses_'+CSS.escape(email)).forEach(cb=>{ if(cb.checked) ses.push(cb.value); }); const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'updateStaffSessions',targetEmail:email,role:$('role_'+email).value,scopeType:$('scope_'+email).value,scopeEventId:$('event_'+email).value,sessionIds:ses}); toast('權限已儲存'); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
function openCompanySettings(){ openPanel('公司資料','系統提供者與登入頁資訊','<div class="notice">此頁需後端提供 getCompanySettings / saveCompanySettings。若尚未提供，請勿用前端暫存。</div><div class="form-grid"><div class="form-field"><label>系統名稱</label><input id="co_system"></div><div class="form-field"><label>公司名稱</label><input id="co_name"></div><div class="form-field"><label>客服 Email</label><input id="co_email"></div><div class="form-field"><label>客服 LINE</label><input id="co_line"></div><div class="form-field"><label>聯絡電話</label><input id="co_phone"></div><div class="form-field"><label>官方網站</label><input id="co_site"></div><div class="form-field full"><label>登入頁顯示文字</label><textarea id="co_login"></textarea></div></div><div class="card-actions"><button class="btn" onclick="saveCompanySettings(this)">儲存公司資料</button></div>'); loadCompanySettings(); }
async function loadCompanySettings(){ try{ const c=await api({action:'getCompanySettings'}); $('co_system').value=c.systemName||''; $('co_name').value=c.companyName||''; $('co_email').value=c.supportEmail||''; $('co_line').value=c.supportLine||''; $('co_phone').value=c.phone||''; $('co_site').value=c.siteUrl||''; $('co_login').value=c.loginText||''; }catch(e){ toast('公司資料 API 尚未提供：'+e.message,5000); } }
async function saveCompanySettings(btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'saveCompanySettings',systemName:$('co_system').value,companyName:$('co_name').value,supportEmail:$('co_email').value,supportLine:$('co_line').value,phone:$('co_phone').value,siteUrl:$('co_site').value,loginText:$('co_login').value}); toast('公司資料已儲存'); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
function openHomepageSettings(){ openPanel('公告 / 首頁顯示','前台顯示內容必須由資料庫設定讀取','<div class="notice">此頁優先使用既有 getSiteConfig / saveSiteConfig。正式公告與首頁卡片若後端未提供，會阻斷不假存。</div><div class="form-grid"><div class="form-field full"><label>首頁封面圖 URL</label><input id="home_hero"></div><div class="form-field full"><label>首頁歡迎詞 / 公告</label><textarea id="home_info"></textarea></div></div><div class="card-actions"><button class="btn" onclick="saveHomepageSettings(this)">儲存首頁顯示</button></div>'); loadHomepageSettings(); }
async function loadHomepageSettings(){ try{ const c=await api({action:'getSiteConfig'}); $('home_hero').value=c.heroImg||''; $('home_info').value=c.infoText||''; }catch(e){toast('首頁設定載入失敗：'+e.message,6000)} }
async function saveHomepageSettings(btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'saveSiteConfig',heroImg:$('home_hero').value,infoText:$('home_info').value}); toast('首頁顯示已儲存'); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
(async function boot(){ const oauth=await handleOAuthCallback(); if(oauth) return; const s=readSession(); if(s&&s.email&&s.token){ saveSession(s); enterAdmin(); } })();
</script>
