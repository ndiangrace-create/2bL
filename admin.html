<body>
<section id="loginPage" class="login-wrap">
  <div class="login-card">
    <img class="login-mark" src="https://raw.githubusercontent.com/ndiangrace-create/2bL/main/logo.jpg" alt="2BL 報名管理系統 Logo" />
    <h1>2BL 報名管理系統</h1>
    <div class="sub">活動報名｜審核繳費｜場次管理｜現場報到</div>
    <div class="login-info"><b>系統服務資訊</b><br>管理員請使用已授權的 Google 帳號登入。若無法登入或需要開通權限，請聯繫系統服務窗口。</div>
    <button class="btn block" onclick="startGoogleLogin()">使用 Google 登入</button>
    <div id="loginErr" class="notice warn hidden" style="text-align:left"></div>
  </div>
</section>

<section id="adminPage" class="hidden">
  <header class="topbar"><div class="topbar-in">
    <div class="brand"><img class="logo" src="https://raw.githubusercontent.com/ndiangrace-create/2bL/main/logo.jpg" alt="2BL"><div><div class="brand-title">2BL 報名管理系統</div><div id="whoText" class="brand-sub">尚未登入</div></div></div>
    <div class="actions"><button class="btn secondary small hide-sm" onclick="refreshCurrentPage()">重新整理</button><button class="btn secondary small" onclick="window.open('onsite.html','_blank')">現場入口</button><button class="btn gray small" onclick="logout()">登出</button></div>
  </div></header>
  <main class="app">
    <nav class="tabs" aria-label="後台主選單">
      <button id="tab-sessions" class="tab active" onclick="switchPage('sessions')">場次</button>
      <button id="tab-todos" class="tab" onclick="switchPage('todos')">待辦</button>
      <button id="tab-members" class="tab" onclick="switchPage('members')">會員</button>
      <button id="tab-settings" class="tab" onclick="switchPage('settings')">設定</button>

<script>
'use strict';
const ADMIN_BUILD = '20260701-admin93-todo-progress-template-011';
const API = 'https://2bl-v7.ndiangrace.workers.dev';
const TENANT_KEY = '2bl_tenant';
const SESSION_KEY = 'tb_v3';
const AdminState = { tenantId:'', email:'', token:'', role:'', name:'', currentPage:'sessions', currentSessionId:null, currentLayer:'root', currentFilter:null, sessions:[], currentSessionDetail:null, currentList:[], members:[], settings:{}, events:[], panelStack:[] };
const $ = id => document.getElementById(id);
const urlParams = new URLSearchParams(location.search);
(function initUrl(){ const t=urlParams.get('tenant')||urlParams.get('tenantId'); const tok=urlParams.get('admin_token'); const err=urlParams.get('login_error'); if(t) sessionStorage.setItem(TENANT_KEY,t); if(tok) sessionStorage.setItem('2bl_admin_token_pending',tok); if(err) sessionStorage.setItem('2bl_login_error_pending',err); if(t||tok||err) history.replaceState({},'',location.pathname+(t?'?tenant='+encodeURIComponent(t):'')); })();
AdminState.tenantId = sessionStorage.getItem(TENANT_KEY)||urlParams.get('tenant')||urlParams.get('tenantId')||'';
function endpoint(){return API.replace(/\/+$/,'');}
function safe(v){return String(v ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function attr(v){return safe(v).replace(/`/g,'&#96;');}
function money(v){ if(v===undefined||v===null||v==='') return '資料庫未提供'; const n=Number(v); if(Number.isNaN(n)) return safe(v); return 'NT$ '+n.toLocaleString('zh-TW'); }
function num(v){ return (v===undefined||v===null||v==='') ? '—' : safe(v); }
function toast(msg,dur=2600){const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._timer); toast._timer=setTimeout(()=>t.classList.remove('show'),dur);}

function safeJson(v, fallback){
  if(v===null||v===undefined||v==='') return fallback;
  if(typeof v !== 'string') return v;
  try{return JSON.parse(v);}catch(e){return fallback;}
}
function normalizeMemberUrl(v){
  const s=String(v||'').trim();
  if(!s) return '';
  if(/^https?:\/\//i.test(s)) return s;
  return 'https://' + s.replace(/^\/+/, '');
}
function normalizeMemberFb(v){
  const s=String(v||'').trim();
  if(!s) return '';
  if(/^https?:\/\//i.test(s)) return s;
  if(s.startsWith('@')) return 'https://www.facebook.com/' + encodeURIComponent(s.slice(1));
  return 'https://www.facebook.com/' + encodeURIComponent(s);
}
function normalizeMemberIg(v){
  const s=String(v||'').trim();
  if(!s) return '';
  if(/^https?:\/\//i.test(s)) return s;
  const handle=s.replace(/^@/,'');
  return 'https://instagram.com/' + encodeURIComponent(handle);
}
function dateTsFromAny(v){
  if(v===null||v===undefined||v==='') return Infinity;
  if(Array.isArray(v)){
    let best=Infinity;
    for(const x of v){ best=Math.min(best,dateTsFromAny(x)); }
    return best;
  }
  if(typeof v==='object') return dateTsFromAny(v.date||v.value||v.start||v.startDate||v.label||'');
  const s=String(v||'').trim();
  if(!s) return Infinity;
  const m=s.match(/(20\d{2})[\/\-\.年](\d{1,2})[\/\-\.月](\d{1,2})/);
  if(m){ const d=new Date(Number(m[1]),Number(m[2])-1,Number(m[3])); return Number.isNaN(d.getTime())?Infinity:d.getTime(); }
  const m2=s.match(/(\d{1,2})[\/\-\.月](\d{1,2})/);
  if(m2){ const y=new Date().getFullYear(); const d=new Date(y,Number(m2[1])-1,Number(m2[2])); return Number.isNaN(d.getTime())?Infinity:d.getTime(); }
  const d=new Date(s); return Number.isNaN(d.getTime())?Infinity:d.getTime();
}
function sessionSortTs(s){ return dateTsFromAny(s?.dates||s?.dates_json||s?.date||s?.dateText||s?.start_date||s?.startAt||s?.createdAt||''); }
function regSortTs(r){ return dateTsFromAny(r?.selectedDates||r?.selected_dates||r?.selected_dates_json||r?.selectedDatesText||r?.dateText||r?.sessionDate||r?.createdAt||r?.created_at||''); }
function sortNearestFirst(list, getter){
  const now=new Date(); now.setHours(0,0,0,0); const base=now.getTime();
  return (list||[]).slice().sort((a,b)=>{
    const ta=getter(a), tb=getter(b);
    const aa=Number.isFinite(ta)?(ta<base?base-ta:ta-base):Infinity;
    const bb=Number.isFinite(tb)?(tb<base?base-tb:tb-base):Infinity;
    if(aa!==bb) return aa-bb;
    return (Number.isFinite(ta)?ta:Infinity)-(Number.isFinite(tb)?tb:Infinity);
  });
}

function unwrap(j){ if(Array.isArray(j)) return j; if(j && Array.isArray(j.data)) return j.data; if(j && j.data !== undefined) return j.data; return j; }
function activeTenant(){ return AdminState.tenantId || 'tuibile'; }
async function api(params={}){ const p={...params,tenant:params.tenant||activeTenant(),email:params.email||AdminState.email||'_',token:params.token||AdminState.token||'',_t:Date.now()}; const qs=new URLSearchParams(); for(const k in p){ const v=p[k]; if(v!==undefined&&v!==null) qs.set(k, typeof v==='object'?JSON.stringify(v):String(v)); } const r=await fetch(API+'?'+qs.toString(),{cache:'no-store'}); const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'})); if(!r.ok||j.error) throw new Error(j.error||j.message||('連線失敗 '+r.status)); return unwrap(j); }
async function apiPost(body={}){ const r=await fetch(API+'?_t='+Date.now(),{method:'POST',headers:{'Content-Type':'application/json;charset=utf-8','Cache-Control':'no-store'},cache:'no-store',body:JSON.stringify({...body,tenant:body.tenant||activeTenant(),email:body.email||AdminState.email,token:body.token||AdminState.token})}); const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'})); if(!r.ok||j.error) throw new Error(j.error||j.message||('連線失敗 '+r.status)); return unwrap(j); }
function startGoogleLogin(){ const t=activeTenant(); if(!t){showLoginError('網址缺少 tenant，無法登入');return;} location.href=endpoint()+'/auth/google/start?tenant='+encodeURIComponent(t); }
async function handleOAuthCallback(){ const token=sessionStorage.getItem('2bl_admin_token_pending'); const loginError=sessionStorage.getItem('2bl_login_error_pending'); sessionStorage.removeItem('2bl_admin_token_pending'); sessionStorage.removeItem('2bl_login_error_pending'); if(loginError){showLoginError({not_authorized:'您的 Google 帳號不在管理員名單內',staff_inactive:'此管理員帳號已停用',id_token_verify_failed:'Google 身份驗證失敗',google_cancelled:'Google 登入已取消',token_exchange_failed:'Google 登入流程錯誤'}[loginError]||('登入失敗：'+loginError));return false;} if(!token) return false; try{ const j=await fetch(endpoint()+'/admin/me?email=_&token='+encodeURIComponent(token)+'&_t='+Date.now(),{cache:'no-store'}).then(r=>r.json()); if(j.error||!j.email){showLoginError('無權限登入後台');return false;} AdminState.tenantId=j.tenant_id||activeTenant(); sessionStorage.setItem(TENANT_KEY,AdminState.tenantId); saveSession({email:j.email,token,role:j.role||j.normalized_role||'',name:j.display_name||j.name||j.email,tenantId:AdminState.tenantId}); enterAdmin(); return true; }catch(e){showLoginError('登入驗證失敗：'+e.message);return false;} }
function showLoginError(msg){const e=$('loginErr'); e.textContent=msg; e.classList.remove('hidden');}
function saveSession(s){ localStorage.setItem(SESSION_KEY,JSON.stringify(s)); AdminState.email=s.email; AdminState.token=s.token; AdminState.role=s.role||''; AdminState.name=s.name||s.email; if(s.tenantId) AdminState.tenantId=s.tenantId; }
function readSession(){ try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch(e){return null} }
function logout(){ if(AdminState.email&&AdminState.token) apiPost({action:'adminLogout'}).catch(()=>{}); localStorage.removeItem(SESSION_KEY); location.reload(); }
async function enterAdmin(){ $('loginPage').classList.add('hidden'); $('adminPage').classList.remove('hidden'); $('whoText').textContent=(AdminState.name||AdminState.email)+'｜'+(AdminState.role||'管理員')+'｜admin93三頁模板版'; await refreshSessionsOverview(); }
function switchPage(page){ AdminState.currentPage=page; ['sessions','todos','members','settings'].forEach(p=>{ $('page-'+p).classList.toggle('hidden',p!==page); $('tab-'+p).classList.toggle('active',p===page); }); if(page==='sessions') renderSessions(); if(page==='todos') loadTodos(); if(page==='members') loadMembers(); }
async function refreshCurrentPage(){ if(AdminState.currentLayer !== 'root' && AdminState.currentSessionId){ await refreshCurrentSessionOnly(); return; } if(AdminState.currentPage==='sessions') await refreshSessionsOverview(); if(AdminState.currentPage==='todos') await loadTodos(); if(AdminState.currentPage==='members') await loadMembers(); }
function sessionId(s){return String(s.id||s.sessionId||s.session_id||'');}
function sessionName(s){return s.name||s.title||s.sessionName||'未命名場次';}
function regSessionId(r){ return String(r.sessionId||r.session_id||r.sessionID||r.session_id_text||''); } // 報名所屬場次 ID 相容函式
function sessionById(id){ for(const s of AdminState.sessions){ if(sessionId(s)===String(id)) return s; } return {}; }
function isArchived(s){ return ['封存','隱藏','已封存'].includes(String(s.status||'')); }
function isClosed(s){ return ['關閉','已關閉','停用','已截止'].includes(String(s.status||'')); }
function formatDate(s){ if(s.dateText) return s.dateText; if(s.date) return String(s.date); if(Array.isArray(s.dates)){ const arr=[]; for(const d of s.dates){ arr.push(typeof d==='object' ? (d.date||'') : d); } return arr.join('、')||'未設定日期'; } return '未設定日期'; }
function textFromMap(v){ if(v===undefined||v===null||v==='') return '資料庫未提供'; if(typeof v === 'string') return safe(v); const parts=[]; for(const k in v){ if(Number(v[k])>0) parts.push(safe(k)+'×'+safe(v[k])); } return parts.join('、') || '無'; }
function equipText(v){ return textFromMap(v); } // 設備文字格式化相容函式
function equipDailyHtml(rows, fallback){ if(Array.isArray(rows)&&rows.length){ return rows.map(r=>safe(r.label||r.date||'日期')+'：攤數 '+safe(r.stallCount||0)+'，'+safe(r.equipmentText||textFromMap(r.equipmentMap))).join('<br>'); } return safe(fallback||'無'); }
function equipDailyText(rows, fallback){ if(Array.isArray(rows)&&rows.length){ return rows.map(r=>(r.label||r.date||'日期')+'：攤數 '+(r.stallCount||0)+'，'+(r.equipmentText||textFromMap(r.equipmentMap))).join('｜'); } return String(fallback||'無'); }
function nz(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
function getStats(s){ const st=s.stats||{}; return { total: nz(st.registrationTotal ?? s.registrationTotal ?? s.total), pending: nz(st.pendingReview ?? s.pendingReview ?? s.pending), approved: nz(st.approved ?? s.approved), unpaid: nz(st.unpaid ?? s.unpaid), paymentPending: nz(st.paymentPending ?? s.paymentPending ?? s.pendingPayment), paid: nz(st.paid ?? s.paid), free: nz(st.free ?? s.free), checked: nz(st.checkedIn ?? s.checkedIn ?? s.seated), refund: nz(st.refund ?? s.refund ?? s.refundReq) }; }
function getFinance(s){ const f=s.finance||{}; return {deposit:nz(f.depositTotal ?? s.depositTotal), receivable:nz(f.receivableTotal ?? s.receivableTotal ?? s.invoiceTotal), received:nz(f.receivedTotal ?? s.receivedTotal ?? s.revenue), unreceived:nz(f.unreceivedTotal ?? s.unreceivedTotal)}; }
function getEquip(s){ const e=s.equipment||{}; return {need:e.neededText ?? e.paidNeededText ?? e.approvedNeededText ?? textFromMap(s.equipNeed), dailyRows:e.dailyRows || s.dailyEquipmentRows || [], dailyText:e.dailyText || s.dailyEquipmentText || '', total:e.totalText || s.totalEquipmentText || e.neededText || textFromMap(s.equipNeed)}; }
async function refreshSessionsOverview(){ AdminState.currentSessionId=null; AdminState.currentLayer='root'; AdminState.currentFilter=null; try{ toast('場次載入中…'); const rows=await api({action:'getSessionDashboard'}); AdminState.sessions = Array.isArray(rows) ? rows : []; renderSessions(); toast('場次已更新'); }catch(e){ $('sessionList').innerHTML='<div class="empty">場次載入失敗：'+safe(e.message)+'</div>'; } }

function sessionLimit(s){ return nz(s.limit ?? s.limitCount ?? s.maxStalls ?? s.max_stalls ?? s.capacity ?? 0); }
function progressText(s){ const st=getStats(s); const lim=sessionLimit(s); return lim>0 ? (st.total + '/' + lim) : String(st.total); }
function dailyChipHtml(rows,text,sid=''){
  if(Array.isArray(rows)&&rows.length){
    return rows.map(r=>'<button type="button" class="chip blue click metric-click" onclick="openEquipmentPanel(\''+attr(sid)+'\',\''+attr(r.date||r.key||'')+'\',\''+attr(r.label||r.date||'每日')+'\')" title="只看 '+safe(r.label||r.date)+' 設備名單">'+safe(r.label||r.date)+'：攤 '+num(r.stallCount||0)+'｜'+safe(r.equipmentText||'無')+'</button>').join('');
  }
  return '<button type="button" class="chip gray click metric-click" onclick="openEquipmentPanel(\''+attr(sid)+'\')" title="查看每日設備報表">每日：'+safe(text||'無')+'</button>';
}
function drillList(sid,filter,label){ if(!sid){toast('缺少場次 ID，無法開明細'); return;} openSessionList(sid,filter,label); }
function financeLineHtml(label,value,sid,filter){ return '<button type="button" class="info-line click" onclick="drillList(\''+attr(sid)+'\',\''+attr(filter)+'\',\''+attr(label)+'明細\')"><span class="metric-click">'+safe(label)+'</span><span>'+money(value)+'</span></button>'; }
function financeCardsHtml(f,sid){
  return '<div class="report-card"><div class="report-title">本場財報</div><div class="click-note">點數字查看同口徑明細</div>'+financeLineHtml('應收',f.receivable,sid,'receivable')+financeLineHtml('已收',f.received,sid,'received')+financeLineHtml('未收',f.unreceived,sid,'unreceived')+financeLineHtml('押金',f.deposit,sid,'deposit')+'</div>';
}
function miniStatButton(label,value,sid,filter){ return '<button type="button" class="mini-stat click" onclick="drillList(\''+attr(sid)+'\',\''+attr(filter)+'\',\''+attr(label)+'\')" title="點擊查看'+safe(label)+'明細"><b>'+num(value)+'</b><span>'+safe(label)+'</span></button>'; }
function statusSummaryHtml(st,sid){
  return '<div class="mini-stat-row">'+miniStatButton('報名',st.total,sid,'all')+miniStatButton('待審核',st.pending,sid,'pending')+miniStatButton('已錄取',st.approved,sid,'approved')+miniStatButton('已繳費',st.paid,sid,'paid')+miniStatButton('免費錄取',st.free,sid,'free')+miniStatButton('付款待確認',st.paymentPending,sid,'paymentPending')+miniStatButton('未繳費',st.unpaid,sid,'unpaid')+miniStatButton('已報到',st.checked,sid,'checked')+miniStatButton('退款',st.refund,sid,'refund')+'</div>';
}
function qualityHtml(r){
  const issues=Array.isArray(r.dataQualityIssues)?r.dataQualityIssues:[];
  return issues.length?'<div class="quality-warn">⚠️ '+issues.map(safe).join('<br>⚠️ ')+'</div>':'';
}
function renderSessions(){ const box=$('sessionList'); const kw=($('sessionSearch')?.value||'').trim().toLowerCase(); const mode=$('sessionStatusFilter')?.value||'current'; const list=[]; for(const s of AdminState.sessions){ if(mode==='current' && isArchived(s)) continue; if(mode==='archived' && !isArchived(s)) continue; if(kw && ![sessionName(s),s.eventName,s.organizer,s.coorg,s.venue,s.location,s.type].join(' ').toLowerCase().includes(kw)) continue; list.push(s); } if(!list.length){box.innerHTML='<div class="empty">目前沒有符合條件的場次</div>';return;} const sorted=sortNearestFirst(list, sessionSortTs); let out=''; for(const s of sorted) out += renderSessionCard(s); box.innerHTML=out; }
function statButton(label,value,kind,sid,filter){ const disabled = value===undefined || value===null || value===''; const shown = disabled ? '—' : safe(value); return '<button class="stat click '+kind+'" onclick="drillList(\''+attr(sid)+'\',\''+attr(filter)+'\',\''+attr(label)+'\')"><b>'+shown+'</b><span>'+safe(label)+'</span></button>'; }

function renderSessionCard(s){
  const sid=sessionId(s), st=getStats(s), f=getFinance(s), e=getEquip(s), lim=sessionLimit(s);
  const btn=(cls,label,value,filter,title)=>'<button type="button" class="chip '+cls+' click" onclick="drillList(\''+attr(sid)+'\',\''+attr(filter)+'\',\''+attr(title||label)+'\')" title="查看'+safe(title||label)+'明細">'+safe(label)+' <b>'+safe(value)+'</b></button>';
  const financeBtn=(cls,label,value,filter)=>'<button type="button" class="chip '+cls+' click" onclick="drillList(\''+attr(sid)+'\',\''+attr(filter)+'\',\''+attr(label)+'明細\')" title="查看'+safe(label)+'明細">'+safe(label)+' <b>'+safe(value)+'</b></button>';
  return '<article class="session-card compact-session" id="session-'+attr(sid)+'"><div class="session-compact-row"><div><div class="session-compact-title">'+safe(sessionName(s))+'</div><div class="meta"><span class="pill blue">'+safe(formatDate(s))+'</span><span class="pill green">'+safe(s.venue||s.location||'未填地點')+'</span><span class="pill '+(isClosed(s)?'pink':'green')+'">'+safe(s.status||'報名中')+'</span></div></div><div class="session-chip-row">'+btn('blue','進度',String(progressText(s))+(lim>0?' 攤':' 筆'),'all','全部名單')+btn('yellow','待審核',num(st.pending),'pending','待審核')+btn('blue','已錄取',num(st.approved),'approved','已錄取')+btn('green','已繳費',num(st.paid),'paid','已繳費')+btn('green','免費',num(st.free),'free','免費錄取')+btn('yellow','待確認',num(st.paymentPending),'paymentPending','付款待確認')+btn('pink','未繳費',num(st.unpaid),'unpaid','未繳費')+btn('blue','已報到',num(st.checked),'checked','已報到')+btn('pink','退款',num(st.refund),'refund','退款')+financeBtn('yellow','應收',money(f.receivable),'receivable')+financeBtn('green','已收',money(f.received),'received')+financeBtn('pink','未收',money(f.unreceived),'unreceived')+financeBtn('purple','押金',money(f.deposit),'deposit')+'<button type="button" class="chip purple click" onclick="openEquipmentPanel(\''+attr(sid)+'\')" title="查看整場設備總表">設備總計 <b>'+safe(e.total||e.need||'無')+'</b></button>'+dailyChipHtml(e.dailyRows,e.dailyText,sid)+'</div><div class="session-actions-compact"><button class="btn secondary small" onclick="openSessionSettings(\''+attr(sid)+'\')">場次設定</button><button class="btn secondary small" onclick="openSessionDetail(\''+attr(sid)+'\')">看明細</button><button class="btn small" onclick="downloadSessionExcel(\''+attr(sid)+'\')">Excel</button></div></div></article>';
}

  if (Array.isArray(arr)) {

async function openRefundPanel(regId, btn=null, sidOverride=''){

      +'<div class="k">距活動日</div><div>'+(sug.daysBefore===null||sug.daysBefore===undefined?'無法判斷':safe(sug.daysBefore)+' 天')+'</div></div>'
      +'</div>'
      +'<div class="report-card"><div class="report-title">退費扣項</div>'
      +'<div class="form-grid">'

      +'<div class="form-field full"><label>退費備註</label><textarea id="refundNoteInput" placeholder="可填寫匯款帳號、處理備註或內部紀錄"></textarea></div>'
      +'</div>'
      +'<div class="notice" style="margin-top:12px"><b>實退金額：</b><span id="refundAmountText">'+money(refund)+'</span><br><span class="sub">公式：已繳金額－行政費－轉帳手續費。確認後會改為已退費、釋出名額與攤位。</span></div>'
      +'<div class="card-actions"><button class="btn danger" onclick="confirmAdminRefund(\''+attr(regId)+'\',\''+attr(sid)+'\')">確認完成退費</button><button class="btn secondary" onclick="panelBack()">取消</button></div>'
      +'</div></div>';

    calcRefundAmount();
  }catch(e){ toast('退費資料載入失敗：'+e.message,7000); }

function calcRefundAmount(){
  const paidTxt=($('refundPaidText')?.textContent||'').replace(/[^0-9.-]/g,'');
  const paid=Number(paidTxt)||0;
  const admin=Number($('refundAdminFeeInput')?.value||0)||0;
  const transfer=Number($('refundTransferFeeInput')?.value||0)||0;
  const refund=Math.max(0, paid-admin-transfer);
  const out=$('refundAmountText');
  if(out) out.textContent=money(refund);
}
async function confirmAdminRefund(regId,sid){
  const paidTxt=($('refundPaidText')?.textContent||'').replace(/[^0-9.-]/g,'');
  const paid=Number(paidTxt)||0;
  const refundAdminFee=Number($('refundAdminFeeInput')?.value||0)||0;
  const refundTransferFee=Number($('refundTransferFeeInput')?.value||0)||0;
  if(refundAdminFee<0||refundTransferFee<0){ toast('扣項不可小於 0',5000); return; }
  if(refundAdminFee+refundTransferFee>paid){ toast('扣項不可大於已繳金額',5000); return; }
  const refundNote=$('refundNoteInput')?.value||'';
  if(!confirm('確定標記為已退費？此動作會釋出名額與攤位。')) return;
  try{
    const res=await apiPost({action:'confirmRefund',regId,sessionId:sid,refundAdminFee,refundTransferFee,refundNote});
    toast('退費已完成，實退 '+money(res.refundAmount||0),5000);
    closeAllPanels();
    await refreshSessionsOverview();
    if(AdminState.currentPage==='todos') await loadTodos();
  }catch(e){ toast('退費處理失敗：'+e.message,8000); }
}

  if(regAction==='remindPayment') { toast('提醒功能尚未串接信件模板，這次不會送出通知',5000); return; }
  const question={reject:'確定標記為不錄取？',waitlist:'確定標記為備取？',confirmPayment:'確定確認付款？',cancelUnpaid:'確定取消未繳費報名？'}[regAction];

    else if(regAction==='markPaymentReported') await apiPost({action:'markPaymentScreenshot',regId,sessionId:sid});

    else if(regAction==='checkin') await apiPost({action:'checkin',regId,sessionId:sid});
    else if(regAction==='undoCheckin') await apiPost({action:'checkin',regId,undo:true,sessionId:sid});

    else await refreshCurrentSessionOnly();
  }catch(e){ toast('操作失敗：'+e.message,6000); }

}

function hasTodoRegId(r){ return !!(r && (r.id||r.regId||r.registrationId||r.registration_id)); }
function normalizeTodoRow(r){
  const sid=r.sessionId||r.session_id||r.sessionID||regSessionId(r)||'';
  const ses=sessionById(sid);
  return {...r, sessionId:sid, sessionName:r.sessionName||r.session_name||sessionName(ses)||'場次', kind:r.kind||r.filter||todoKindFromRow(r), label:r.label||todoLabelFromKind(r.kind||r.filter||todoKindFromRow(r))};
}
function todoKindFromRow(r){
  const review=String(r.reviewStatus||r.status||r.review_status||'');
  const pay=String(r.paymentStatus||r.payStatus||r.payment_status||'');
  const transfer=String(r.transferStatus||r.transfer_status||r.refundStatus||r.refund_status||'');
  const check=String(r.checkinStatus||r.checkin||r.checkin_status||'');
  const eq=regEquipText(r);
  const dates=regDateText(r);
  const hasDataIssue = (dates.includes('未設定') || !r.email || !r.phone || !(r.brandName||r.brand||r.brand_name||r.name) || String(r.dataQualityIssues||'').length>0);
  if(transfer.includes('退費')||transfer.includes('退款')||transfer.includes('refund')||pay.includes('已退費')||pay.includes('已退款')) return 'refund';
  if(hasDataIssue) return 'dataIssue';
  if(review.includes('待審核') || review==='待審' || review==='報名成功' || review==='') return 'pending';
  if(review.includes('已錄取') && (pay.includes('待確認')||pay.includes('付款待確認')||pay.includes('回報'))) return 'paymentPending';
  if(review.includes('已錄取') && (pay.includes('未繳費')||!pay)) return 'unpaid';
  if(review.includes('已錄取') && (isPaidText(pay)||isFreePayText(pay)) && !check.includes('已報到')) return 'checkin';
  if(review.includes('已錄取') && (isPaidText(pay)||isFreePayText(pay)) && eq && eq!=='無' && eq!=='未設定') return 'equipment';
  return 'all';
}

}

function todoFlowHtml(kind){
  const steps=[['pending','待審核'],['unpaid','待付款'],['paymentPending','付款待確認'],['checkin','待報到'],['refund','退費待處理'],['dataIssue','資料異常'],['equipment','設備待確認']];
  const idx=steps.findIndex(x=>x[0]===kind);
  let out='<div class="todo-flow" aria-label="待辦流程">';
  steps.forEach((st,i)=>{
    const cls = i===idx ? 'active' : (idx>=0 && i<idx ? 'done' : '');
    const alert = (st[0]==='refund'||st[0]==='dataIssue') ? ' alert' : '';
    out+='<span class="todo-flow-step '+cls+alert+'">'+safe(st[1])+'</span>';
    if(i<steps.length-1) out+='<span class="todo-flow-arrow">›</span>';
  });
  out+='</div>';
  return out;
}
function todoSocialLinks(r){
  const fb=normalizeMemberFb(r.fb||r.fbUrl||r.fb_url||r.facebook||r.facebook_url||'');
  const ig=normalizeMemberIg(r.ig||r.igUrl||r.ig_url||r.instagram||r.instagram_url||'');
  const web=normalizeMemberUrl(r.website||r.websiteUrl||r.website_url||r.officialUrl||r.official_url||r.url||r.web||r.homepage||'');
  let out='';
  if(fb) out+='<a class="todo-social fb" href="'+attr(fb)+'" target="_blank" rel="noopener" title="開啟 Facebook">FB</a>';
  if(ig) out+='<a class="todo-social ig" href="'+attr(ig)+'" target="_blank" rel="noopener" title="開啟 Instagram">IG</a>';
  if(web) out+='<a class="todo-social web" href="'+attr(web)+'" target="_blank" rel="noopener" title="開啟官網">官網</a>';
  return out ? '<span class="todo-socials">'+out+'</span>' : '';
}
async function buildTodoRowsFromSessions(){
  if(!AdminState.sessions.length){
    try{ const rows=await api({action:'getSessionDashboard'}); AdminState.sessions=Array.isArray(rows)?rows:[]; }catch(e){}
  }
  AdminState.currentLayer='todos';
  const wanted=[['pending','待審核'],['paymentPending','付款待確認'],['unpaid','待付款'],['refund','退費待處理']];
  const out=[]; const seen=new Set();
  for(const s of AdminState.sessions){
    const sid=sessionId(s); if(!sid) continue;
    for(const [kind,label] of wanted){
      let rows=[];
      try{ rows=await api({action:'getSessionRegistrations',sessionId:sid,filter:kind}); }catch(e){ rows=[]; }
      for(const r of (Array.isArray(rows)?rows:[])){
        if(!filterReg(r,kind)) continue;
        const id=String(r.id||r.regId||r.registrationId||r.registration_id||'');
        const key=id || (sid+'|'+kind+'|'+(r.email||'')+'|'+(r.createdAt||r.created_at||''));
        if(seen.has(key)) continue; seen.add(key);
        out.push({...r, sessionId:sid, sessionName:r.sessionName||sessionName(s), kind, label});
      }
    }
  }
  return out;
}
function renderTodoRows(rows){
  let out='';
  const list=sortNearestFirst((Array.isArray(rows)?rows:[]).map(normalizeTodoRow).filter(r=>hasTodoRegId(r)), regSortTs);
  AdminState.currentList=list;
  for(const r of list){
    const sid=r.sessionId||'';
    const title=r.sessionName||sessionName(sessionById(sid))||'場次';
    const kind=todoKindFromRow(r);
    const label=todoLabelFromKind(kind);
    const who=r.brandName||r.brand||r.brand_name||r.name||r.email||'未填品牌';
    const phone=r.phone||r.mobile||'';
    const email=r.email||'';
    const dates=regDateText(r);
    const stalls=r.stallCount||r.stall_count||r.stalls||'';
    const amount=Number(r.amount||r.total||r.totalAmount||r.registration_total_amount||0);
    const equip=regEquipText(r);
    const info=[];
    const contact=[];
    if(r.name && r.name!==who) contact.push('聯絡人：'+safe(r.name));
    if(phone) contact.push('電話：'+safe(phone));
    if(email) contact.push('Email：'+safe(email));
    if(contact.length) info.push(contact.join('　'));
    const line2=[];
    if(dates) line2.push('報名日期：'+safe(dates));
    if(stalls) line2.push('攤位數：'+safe(stalls));
    if(amount) line2.push('金額：'+money(amount));
    if(equip && equip!=='未設定') line2.push('設備：'+safe(equip));
    if(line2.length) info.push(line2.join('　'));
    out+='<article class="reg-card todo-card"><div><div class="todo-headline"><span class="reg-title todo-main-title">'+safe(title)+'｜'+safe(who)+'</span>'+todoSocialLinks(r)+'</div><div class="todo-stage-row"><span class="todo-stage-badge '+safe(kind)+'">'+safe(label)+'</span><span class="todo-next">下一步：'+safe(todoNextText(kind))+'</span></div><div class="reg-sub todo-sub">'+(info.join('<br>')||safe(label))+'</div>'+todoFlowHtml(kind)+'</div><div class="reg-actions todo-direct-actions">'+todoStageButtons(r,kind)+'</div></article>';
  }
  $('todoList').innerHTML=out||'<div class="empty">目前沒有待辦</div>';
}
function todoStageButtons(r,kind){
  const id=r.id||r.regId||r.registrationId||r.registration_id||'';
  const sid=regSessionId(r)||r.sessionId||r.session_id||AdminState.currentSessionId||'';
  if(!id) return '<span class="tag">缺少報名 ID</span>';
  const btn=(act,label,cls='secondary')=>'<button class="btn small '+cls+'" onclick="runRegAction(\''+attr(id)+'\',\''+attr(act)+'\',this,\''+attr(sid)+'\')">'+safe(label)+'</button>';
  if(kind==='pending') return btn('approve','錄取')+btn('reject','不錄取')+btn('waitlist','備取');
  if(kind==='paymentPending') return btn('confirmPayment','確認付款')+btn('markUnpaid','退回未繳費')+btn('note','備註','secondary');
  if(kind==='unpaid') return btn('remindPayment','提醒')+btn('note','備註','secondary');
  if(kind==='checkin') return btn('checkin','報到')+btn('note','備註','secondary');
  if(kind==='refund') return btn('refund','處理退費')+btn('markRefunded','標記已退費')+btn('note','備註','secondary');
  if(kind==='dataIssue') return '<button class="btn small secondary" onclick="openRegDetail(\''+attr(id)+'\')">完整資料</button>'+btn('note','備註','secondary');
  if(kind==='equipment') return '<button class="btn small secondary" onclick="openEquipmentPanel(\''+attr(sid)+'\')">設備總表</button>'+btn('note','備註','secondary');
  return actionButtons(r);
}

function memberBrand(m){ return m.brandName||m.brand_name||m.brand||m.storeName||m.store_name||m.displayName||m.name||m.email||'未命名會員'; }
function memberName(m){ return m.name||m.displayName||m.contactName||m.contact_name||'—'; }
function memberKey(m){ return String(m.id||m.email||m.phone||memberBrand(m)||'').trim(); }
function memberOfficialUrl(m){ return m.website||m.websiteUrl||m.website_url||m.officialUrl||m.official_url||m.url||m.web||m.homepage||''; }
function memberSearchText(m){ return [m.brandName,m.brand_name,m.brand,m.storeName,m.name,m.displayName,m.phone,m.email,m.fb,m.fbUrl,m.fb_url,m.facebook,m.ig,m.igUrl,m.ig_url,m.instagram,memberOfficialUrl(m),m.intro,m.description,m.category,m.saleCategory].join(' ').toLowerCase(); }
function memberIconLinks(m){
  const fb=normalizeMemberFb(m.fb||m.fbUrl||m.fb_url||m.facebook||m.facebook_url);
  const ig=normalizeMemberIg(m.ig||m.igUrl||m.ig_url||m.instagram||m.instagram_url);
  const web=normalizeMemberUrl(memberOfficialUrl(m));
  let out='';
  if(fb) out+='<a class="member-icon fb" href="'+attr(fb)+'" target="_blank" rel="noopener" title="開啟 Facebook">FB</a>';
  if(ig) out+='<a class="member-icon ig" href="'+attr(ig)+'" target="_blank" rel="noopener" title="開啟 Instagram">IG</a>';
  if(web) out+='<a class="member-icon web" href="'+attr(web)+'" target="_blank" rel="noopener" title="開啟官網">官網</a>';
  return out || '<span class="tag">未填社群</span>';
}
async function loadMembers(){
  const box=$('memberList');
  if(!box) return;
  if(AdminState.currentPage!=='members') return;
  box.innerHTML='<div class="loading">載入會員中…</div>';
  try{
    const rows=await api({action:'getMembers'});
    AdminState.members=Array.isArray(rows)?rows:[];
    renderMembers();
  }catch(e){
    box.innerHTML='<div class="empty">會員載入失敗：'+safe(e.message)+'</div>';
  }
}
function renderMembers(){
  const box=$('memberList');
  if(!box) return;
  const kw=($('memberSearch')?.value||'').trim().toLowerCase();
  let list=Array.isArray(AdminState.members)?AdminState.members.slice():[];
  if(kw) list=list.filter(m=>memberSearchText(m).includes(kw));
  list.sort((a,b)=>String(memberBrand(a)).localeCompare(String(memberBrand(b)),'zh-Hant'));
  if(!list.length){
    box.innerHTML='<div class="empty">目前沒有符合條件的會員 / 品牌</div>';
    return;
  }
  let html='';
  for(const m of list){
    const key=attr(memberKey(m));
    const brand=memberBrand(m);
    const name=memberName(m);
    const phone=m.phone||m.mobile||'—';
    const email=m.email||'—';
    const cat=m.category||m.saleCategory||m.sellCategory||m.sell_category||'—';
    const intro=m.intro||m.brandIntro||m.description||m.brand_intro||'—';
    const updated=m.updatedAt||m.updated_at||m.joinedAt||m.joined_at||m.createdAt||m.created_at||'—';
    html+='<article class="member-card"><div><div class="member-title">'+safe(brand)+'</div><div class="member-sub">聯絡人：'+safe(name)+'　電話：'+safe(phone)+'　Email：'+safe(email)+'</div><div class="member-icons">'+memberIconLinks(m)+'</div><div class="member-meta"><span class="tag purple">類別：'+safe(cat)+'</span><span class="tag green">更新：'+safe(updated)+'</span></div><div class="member-note">品牌介紹：'+safe(intro)+'</div></div><div class="member-actions"><button class="btn secondary small" onclick="openMemberHistory(\''+key+'\')">歷史報名</button></div></article>';
  }
  box.innerHTML=html;
}
async function openMemberHistory(key){
  const k=String(key||'').trim();
  if(!k){toast('缺少會員查詢關鍵字');return;}
  openPanel('會員歷史｜'+safe(k),'顯示此品牌 / 會員所有歷史報名紀錄','<div class="loading">載入歷史報名中…</div>');
  try{
    const rows=await api({action:'getMemberHistory',memberKey:k});
    const list=Array.isArray(rows)?rows:[];
    if(!list.length){ $('panelBody').innerHTML='<div class="empty">查無歷史報名紀錄</div>'; return; }
    $('panelBody').innerHTML='<div class="cards">'+list.map(r=>renderRegCard(r)).join('')+'</div>';
  }catch(e){
    $('panelBody').innerHTML='<div class="empty">歷史報名載入失敗：'+safe(e.message)+'</div>';
  }
}

function renderEmailTemplates(rows){ let out=''; for(const t of (Array.isArray(rows)?rows:[])){ out+='<div class="card" style="padding:14px"><b>'+safe(t.title||t.templateKey||'模板')+'</b><div class="form-grid"><div class="form-field full"><label>主旨</label><input id="sub_'+attr(t.templateKey)+'" value="'+attr(t.subject||'')+'"></div><div class="form-field full"><label>內容</label><textarea id="body_'+attr(t.templateKey)+'">'+safe(t.body||'')+'</textarea></div></div><div class="card-actions"><button class="btn small" onclick="saveEmailTemplate(\''+attr(t.templateKey)+'\',this)">儲存</button></div></div>'; } $('panelBody').innerHTML=out||'<div class="empty">目前沒有信件模板資料</div>'; }

async function saveAgreementTemplate(slot,btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'saveAgreementTemplate',slot_no:slot,label:$('agt_label_'+slot).value,title:$('agt_title_'+slot).value,version:$('agt_version_'+slot).value,content:$('agt_content_'+slot).value}); toast('合約已儲存'); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
async function openStaffSettings(){ openPanel('權限管理','管理帳號與授權範圍','<div class="loading">人員載入中…</div>'); try{ const [staff,events,sessions]=await Promise.all([api({action:'getStaff'}),api({action:'getEventsAdmin'}).catch(()=>[]),api({action:'getSessionDashboard'}).catch(()=>AdminState.sessions)]); AdminState.events=Array.isArray(events)?events:[]; AdminState.sessions=Array.isArray(sessions)?sessions:AdminState.sessions; let out='<div class="card-actions"><button class="btn" onclick="openAddStaffForm()">＋ 新增管理員</button></div>'; for(const st of (Array.isArray(staff)?staff:[])) out+=renderStaffCard(st); $('panelBody').innerHTML=out; }catch(e){$('panelBody').innerHTML='<div class="empty">人員載入失敗：'+safe(e.message)+'</div>';} }

async function addStaff(btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='新增中…'; try{ await apiPost({action:'addStaff',targetEmail:$('add_email').value.trim(),targetName:$('add_name').value.trim(),role:$('add_role').value}); toast('已新增管理員'); panelBack(); openStaffSettings(); }catch(e){toast('新增失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
async function saveStaffScope(email,btn){ const ses=[]; document.querySelectorAll('.scope_ses_'+CSS.escape(email)).forEach(cb=>{ if(cb.checked) ses.push(cb.value); }); const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'updateStaffSessions',targetEmail:email,role:$('role_'+email).value,scopeType:$('scope_'+email).value,scopeEventId:$('event_'+email).value,sessionIds:ses}); toast('權限已儲存'); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
