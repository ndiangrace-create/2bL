<script>

const $ = id => document.getElementById(id);
const urlParams = new URLSearchParams(location.search);
(function initUrl(){ const t=urlParams.get('tenant')||urlParams.get('tenantId'); const tok=urlParams.get('admin_token'); const err=urlParams.get('login_error'); if(t) sessionStorage.setItem(TENANT_KEY,t); if(tok) sessionStorage.setItem('2bl_admin_token_pending',tok); if(err) sessionStorage.setItem('2bl_login_error_pending',err); if(t||tok||err) history.replaceState({},'',location.pathname+(t?'?tenant='+encodeURIComponent(t):'')); })();

}
function normalizeMemberUrl(v){

function dateTsFromAny(v){
  if(v===null||v===undefined||v==='') return Infinity;
  if(Array.isArray(v)){
    let best=Infinity;
    for(const x of v){ best=Math.min(best,dateTsFromAny(x)); }
    return best;
  }
  if(typeof v==='object') return dateTsFromAny(v.date||v.value||v.start||v.startDate||v.label||'');
  const s=String(v||'').trim();
  if(!s) return Infinity;
  const m=s.match(/(20\d{2})[\/\-\.年](\d{1,2})[\/\-\.月](\d{1,2})/);
  if(m){ const d=new Date(Number(m[1]),Number(m[2])-1,Number(m[3])); return Number.isNaN(d.getTime())?Infinity:d.getTime(); }
  const m2=s.match(/(\d{1,2})[\/\-\.月](\d{1,2})/);
  if(m2){ const y=new Date().getFullYear(); const d=new Date(y,Number(m2[1])-1,Number(m2[2])); return Number.isNaN(d.getTime())?Infinity:d.getTime(); }
  const d=new Date(s); return Number.isNaN(d.getTime())?Infinity:d.getTime();
}
function sessionSortTs(s){ return dateTsFromAny(s?.dates||s?.dates_json||s?.date||s?.dateText||s?.start_date||s?.startAt||s?.createdAt||''); }

function sortNearestFirst(list, getter){
  const now=new Date(); now.setHours(0,0,0,0); const base=now.getTime();
  return (list||[]).slice().sort((a,b)=>{
    const ta=getter(a), tb=getter(b);
    const aa=Number.isFinite(ta)?(ta<base?base-ta:ta-base):Infinity;
    const bb=Number.isFinite(tb)?(tb<base?base-tb:tb-base):Infinity;
    if(aa!==bb) return aa-bb;
    return (Number.isFinite(ta)?ta:Infinity)-(Number.isFinite(tb)?tb:Infinity);
  });
}

function unwrap(j){ if(Array.isArray(j)) return j; if(j && Array.isArray(j.data)) return j.data; if(j && j.data !== undefined) return j.data; return j; }

async function api(params={}){ const p={...params,tenant:params.tenant||activeTenant(),email:params.email||AdminState.email||'_',token:params.token||AdminState.token||'',_t:Date.now()}; const qs=new URLSearchParams(); for(const k in p){ const v=p[k]; if(v!==undefined&&v!==null) qs.set(k, typeof v==='object'?JSON.stringify(v):String(v)); } const r=await fetch(API+'?'+qs.toString(),{cache:'no-store'}); const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'})); if(!r.ok||j.error) throw new Error(j.error||j.message||('連線失敗 '+r.status)); return unwrap(j); }

function startGoogleLogin(){ const t=activeTenant(); if(!t){showLoginError('網址缺少 tenant，無法登入');return;} location.href=endpoint()+'/auth/google/start?tenant='+encodeURIComponent(t); }
async function handleOAuthCallback(){ const token=sessionStorage.getItem('2bl_admin_token_pending'); const loginError=sessionStorage.getItem('2bl_login_error_pending'); sessionStorage.removeItem('2bl_admin_token_pending'); sessionStorage.removeItem('2bl_login_error_pending'); if(loginError){showLoginError({not_authorized:'您的 Google 帳號不在管理員名單內',staff_inactive:'此管理員帳號已停用',id_token_verify_failed:'Google 身份驗證失敗',google_cancelled:'Google 登入已取消',token_exchange_failed:'Google 登入流程錯誤'}[loginError]||('登入失敗：'+loginError));return false;} if(!token) return false; try{ const j=await fetch(endpoint()+'/admin/me?email=_&token='+encodeURIComponent(token)+'&_t='+Date.now(),{cache:'no-store'}).then(r=>r.json()); if(j.error||!j.email){showLoginError('無權限登入後台');return false;} AdminState.tenantId=j.tenant_id||activeTenant(); sessionStorage.setItem(TENANT_KEY,AdminState.tenantId); saveSession({email:j.email,token,role:j.role||j.normalized_role||'',name:j.display_name||j.name||j.email,tenantId:AdminState.tenantId}); if((j.normalized_role||j.role)==='onsite_staff'){ location.href='onsite.html?admin_token='+encodeURIComponent(token)+'&tenant='+encodeURIComponent(AdminState.tenantId); return true; } enterAdmin(); return true; }catch(e){showLoginError('登入驗證失敗：'+e.message);return false;} }

function saveAdminPageState(page){ try{ const p=page||AdminState.currentPage||'sessions'; const L=AdminState.currentLayer||'root'; const st={page:p, layer:L, sid:AdminState.currentSessionId||'', filter:AdminState.currentFilter||'', dateKey:(L==='equipment')?(AdminState._navDateKey||''):'', dateLabel:(L==='equipment')?(AdminState._navDateLabel||''):'', updatedAt:Date.now()}; localStorage.setItem(ADMIN_PAGE_STATE_KEY, JSON.stringify(st)); }catch(e){} }

function isRefundLikeText(v){ const s=String(v||''); return s.includes('退費')||s.includes('退款')||s.includes('refund'); }
function isRefundCompletedRow(r){ const t=String(r.transferStatus||r.transfer_status||r.refundStatus||r.refund_status||''); const p=String(r.paymentStatus||r.payStatus||r.payment_status||''); return ['已退費','已退款','refunded'].includes(t) || ['已退費','已退款','refunded'].includes(p) || !!(r.refundedAt||r.refunded_at); }
function isFreePayText(v){ const s=String(v||''); return s==='免費'||s.includes('免費'); }
function isPaidText(v){ const s=String(v||''); return s.includes('已繳')||s.includes('已付款')||s.includes('付款完成')||s.includes('付款成功')||s==='paid'||s==='confirmed_paid'||s==='payment_confirmed'; }
function isRegActiveForList(reg){ const review=String(reg.reviewStatus||reg.status||''); const pay=String(reg.paymentStatus||reg.payStatus||''); const refund=String(reg.transferStatus||reg.refundStatus||''); if(['已取消','不錄取','未錄取'].includes(review)) return false; if(pay==='已退費'||pay==='已退款') return false; if(isRefundLikeText(refund)) return false; return true; }
function isApprovedText(v){ return String(v||'')==='已錄取'; }
function filterReg(reg,filter){ const review=String(reg.reviewStatus||reg.status||''); const pay=String(reg.paymentStatus||reg.payStatus||''); const check=String(reg.checkinStatus||reg.checkin||''); const refund=String(reg.transferStatus||reg.refundStatus||''); const active=isRegActiveForList(reg); const approved=isApprovedText(review); const cash=Number(reg.amount||reg.totalAmount||reg.receivableAmount||0)||0; const received=Number(reg.receivedAmount||0)||0; const unreceived=Number(reg.unreceivedAmount||0)||0; const deposit=Number(reg.deposit||reg.depositAmount||0)||0; if(filter==='all') return true; if(filter==='pending') return active&&(review.includes('待審')||review==='報名成功'||review===''); if(filter==='approved') return active&&approved; if(filter==='unpaid') return active&&approved&&(pay.includes('未繳')||pay===''); if(filter==='paymentPending') return active&&approved&&(pay.includes('待確認')||pay.includes('回報')); if(filter==='paid') return active&&approved&&isPaidText(pay); if(filter==='free') return active&&approved&&isFreePayText(pay); if(filter==='checked') return active&&check.includes('已報到'); if(filter==='refund') return (isRefundLikeText(refund) && !isRefundCompletedRow(reg)); if(filter==='equipment') return active&&approved&&(isPaidText(pay)||isFreePayText(pay))&&regEquipText(reg)!=='無'; if(filter==='receivable') return active&&approved&&cash>0; if(filter==='received') return active&&approved&&isPaidText(pay)&&received>0; if(filter==='unreceived') return active&&approved&&unreceived>0; if(filter==='deposit') return active&&approved&&deposit>0; if(filter==='checkin') return active&&approved&&(isPaidText(pay)||isFreePayText(pay)); return true; }

function regDateText(r){
  const v = r.selectedDatesText || r.selected_dates_text || r.dateText || r.registrationDateText || r.appliedDateText || '';
  if (v) return String(v);
  const raw = r.selectedDates || r.selected_dates || r.selected_dates_json || r.dates || r.dates_json || r.date || '';
  const arr = safeJson(raw, raw);
  if (Array.isArray(arr)) {
    const out = arr.map(d => typeof d === 'object' ? (d.label || d.date || d.value || '') : String(d || '')).filter(Boolean);
    return out.join('、') || '未設定';
  }
  if (typeof arr === 'object' && arr) {

    return out.join('、') || '未設定';
  }
  return String(raw || '未設定');
}

async function openRefundPanel(regId, btn=null, sidOverride=''){
  const sid=sidOverride||AdminState.currentSessionId||'';
  if(!sid){ toast('缺少場次鎖定，無法處理退費',5000); return; }
  if(!regId){ toast('缺少報名 ID，無法處理退費',5000); return; }
  const old=btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='讀取退費…'; }
  try{
    const sug=await apiPost({action:'getRefundSuggestion',regId,sessionId:sid});
    const paid=Number(sug.paidAmount||0)||0;
    const adminFee=Number(sug.refundAdminFee||0)||0;
    const transferFee=Number(sug.refundTransferFee||0)||0;
    const refund=Math.max(0, paid-adminFee-transferFee);
    const html='<div class="readable-detail">'
      +'<div class="report-card"><div class="report-title">退費處理</div>'
      +'<div class="kv"><div class="k">已繳金額</div><div id="refundPaidText">'+money(paid)+'</div>'
      +'<div class="k">活動日期</div><div>'+safe(sug.eventDate||'資料庫未提供')+'</div>'
      +'<div class="k">退費規則</div><div>'+safe(sug.refundRuleLabel||'主辦手動確認')+'</div>'
      +'<div class="k">距活動日</div><div>'+(sug.daysBefore===null||sug.daysBefore===undefined?'無法判斷':safe(sug.daysBefore)+' 天')+'</div></div>'
      +'</div>'
      +'<div class="report-card"><div class="report-title">退費扣項</div>'
      +'<div class="form-grid">'
      +'<div class="form-field"><label>行政費</label><input id="refundAdminFeeInput" type="number" min="0" value="'+attr(adminFee)+'" oninput="calcRefundAmount()"></div>'
      +'<div class="form-field"><label>轉帳手續費</label><input id="refundTransferFeeInput" type="number" min="0" value="'+attr(transferFee)+'" oninput="calcRefundAmount()"></div>'
      +'<div class="form-field full"><label>退費備註</label><textarea id="refundNoteInput" placeholder="可填寫匯款帳號、處理備註或內部紀錄"></textarea></div>'
      +'</div>'
      +'<div class="notice" style="margin-top:12px"><b>實退金額：</b><span id="refundAmountText">'+money(refund)+'</span><br><span class="sub">公式：已繳金額－行政費－轉帳手續費。確認後會改為已退費、釋出名額與攤位。</span></div>'
      +'<div class="card-actions"><button class="btn danger" onclick="confirmAdminRefund(\''+attr(regId)+'\',\''+attr(sid)+'\')">確認完成退費</button><button class="btn secondary" onclick="panelBack()">取消</button></div>'
      +'</div></div>';
    openPanel('處理退費','請依資料庫規則確認扣項與實退金額',html);
    calcRefundAmount();
  }catch(e){ const msg=String(e.message||e); toast('退費資料載入失敗：'+msg,7000); if(msg.includes('已完成退費')||msg.includes('已退費')){ try{ await refreshSessionsOverview(); if(AdminState.currentPage==='todos') await loadTodos(); }catch(_e){} } }
  finally{ if(btn){ btn.disabled=false; btn.textContent=old; } }
}
function calcRefundAmount(){
  const paidTxt=($('refundPaidText')?.textContent||'').replace(/[^0-9.-]/g,'');
  const paid=Number(paidTxt)||0;
  const admin=Number($('refundAdminFeeInput')?.value||0)||0;
  const transfer=Number($('refundTransferFeeInput')?.value||0)||0;
  const refund=Math.max(0, paid-admin-transfer);
  const out=$('refundAmountText');
  if(out) out.textContent=money(refund);
}
async function confirmAdminRefund(regId,sid){
  const paidTxt=($('refundPaidText')?.textContent||'').replace(/[^0-9.-]/g,'');
  const paid=Number(paidTxt)||0;
  const refundAdminFee=Number($('refundAdminFeeInput')?.value||0)||0;
  const refundTransferFee=Number($('refundTransferFeeInput')?.value||0)||0;
  if(refundAdminFee<0||refundTransferFee<0){ toast('扣項不可小於 0',5000); return; }
  if(refundAdminFee+refundTransferFee>paid){ toast('扣項不可大於已繳金額',5000); return; }
  const refundNote=$('refundNoteInput')?.value||'';
  if(!confirm('確定標記為已退費？此動作會釋出名額與攤位。')) return;
  try{
    const res=await apiPost({action:'confirmRefund',regId,sessionId:sid,refundAdminFee,refundTransferFee,refundNote});
    toast('退費已完成，實退 '+money(res.refundAmount||0),5000);
    closeAllPanels();
    await refreshSessionsOverview();
    if(AdminState.currentPage==='todos') await loadTodos();
  }catch(e){ const msg=String(e.message||e); toast('退費處理失敗：'+msg,8000); if(msg.includes('已完成退費')||msg.includes('已退費')){ try{ closeAllPanels(); await refreshSessionsOverview(); if(AdminState.currentPage==='todos') await loadTodos(); }catch(_e){} } }
}


async function sendPaymentReminder(regId,btn,sid){
  if(!regId || !sid){ toast('缺少報名或場次資料，無法寄提醒',5000); return; }
  if(!confirm('確定要寄出待付款提醒信？')) return;
  const old=btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='寄信中…'; }
  try{
    const res=await apiPost({action:'sendPaymentReminder',regId,sessionId:sid});
    toast('已寄出待付款提醒信'+(res && res.to ? '：'+res.to : ''),5000);
    if(AdminState.currentPage==='todos') await loadTodos();
  }catch(e){
    toast('提醒信寄送失敗：'+e.message,8000);
  }finally{
    if(btn){ btn.disabled=false; btn.textContent=old; }
  }
}

async function runRegAction(regId,regAction,btn,sidOverride=''){
  const sid=sidOverride||AdminState.currentSessionId||'';
  if(!sid){ toast('缺少場次鎖定，已阻斷操作',5000); return; }
  if(!regId){toast('找不到報名 ID');return;}
  if(regAction==='refund' || regAction==='markRefunded') { await openRefundPanel(regId,btn,sid); return; }
  if(regAction==='note') { const note=(prompt('輸入備註內容（會存到這筆報名）：')||'').trim(); if(!note){ return; } try{ await apiPost({action:'saveRegNote',regId,sessionId:sid,note}); toast('備註已儲存'); await refreshCurrentPage(); }catch(e){ toast('備註儲存失敗：'+(e.message||e),5000); } return; }
  if(regAction==='remindPayment') { await sendPaymentReminder(regId,btn,sid); return; }
  const question={reject:'確定標記為不錄取？',waitlist:'確定標記為備取？',confirmPayment:'確定確認付款？',cancelUnpaid:'確定取消未繳費報名？'}[regAction];
  if(question && !confirm(question)) return;
  const old=btn.textContent; btn.disabled=true; btn.textContent='處理中…';
  try{
    if(regAction==='approve') await apiPost({action:'approveReg',regId,approved:true,sessionId:sid});
    else if(regAction==='reject') await apiPost({action:'approveReg',regId,approved:false,sessionId:sid});
    else if(regAction==='waitlist') await apiPost({action:'approveReg',regId,status:'備取',sessionId:sid});
    else if(regAction==='markPaymentReported') await apiPost({action:'markPaymentScreenshot',regId,sessionId:sid});
    else if(regAction==='confirmPayment') await apiPost({action:'confirmPayment',regId,sessionId:sid});
    else if(regAction==='checkin') await apiPost({action:'checkin',regId,sessionId:sid});
    else if(regAction==='undoCheckin') await apiPost({action:'checkin',regId,undo:true,sessionId:sid});
    else if(regAction==='cancelUnpaid') await apiPost({action:'adminCancelReg',regId,sessionId:sid});
    else await apiPost({action:'updateRegistrationAction',regId,regAction,sessionId:sid});
    toast('已更新');
    if(AdminState.currentPage==='todos' && AdminState.currentLayer==='todos') await loadTodos();
    else await refreshCurrentSessionOnly();
  }catch(e){ toast('操作失敗：'+e.message,6000); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
async function refreshCurrentSessionOnly(){ const sid=AdminState.currentSessionId; if(!sid) return; try{ const rows=await api({action:'getSessionDashboard',sessionId:sid}); if(Array.isArray(rows) && rows[0]){ let replaced=false; for(let i=0;i<AdminState.sessions.length;i++){ if(sessionId(AdminState.sessions[i])===sid){ AdminState.sessions[i]=rows[0]; replaced=true; } } if(!replaced) AdminState.sessions.push(rows[0]); } if(AdminState.currentLayer==='sessionList') await openSessionList(sid,AdminState.currentFilter,$('panelTitle').textContent.split('｜').pop()||'名單'); renderSessions(); }catch(e){toast('刷新本場失敗：'+e.message,6000);} }

function loadSessionSeatMapFile(input){
  const file=input && input.files && input.files[0];
  if(!file) return;
  if(!/^image\//.test(file.type||'')){ toast('請選擇圖片檔'); input.value=''; return; }
  const reader=new FileReader();
  reader.onload=()=>{ const url=reader.result||''; if($('set_seatMapUrl')) $('set_seatMapUrl').value=url; AdminSessionSeatMapDirty=true; toggleSessionSeatSettings(); toast('已載入場地圖，請先按「儲存地圖」保存'); };

  reader.readAsDataURL(file);

async function loadSessionSeatSettings(sid,s){
  AdminSessionSeatMapDirty=false;
  try{
    const data=await api({action:'getSeatMap',sessionId:sid});
    if(data && !data.error){
      const dbMapUrl=String(data.mapUrl||'').trim();
      if($('set_seatMapUrl') && dbMapUrl) $('set_seatMapUrl').value=dbMapUrl;
      if($('set_seatHoldHours') && data.holdHours) $('set_seatHoldHours').value=data.holdHours;
      // 選位號碼必須跟已儲存的場地圖一起存在；沒有地圖時不顯示/沿用舊預設號碼。
      renderSessionSeatRows((dbMapUrl && data.seats && data.seats.length)?data.seats:[]);
      toggleSessionSeatSettings();
      return;
    }
  }catch(e){ console.warn('getSeatMap skipped',e); }
  // 不再從 stallList 自動產生錯誤編號；選位號碼只讀 getSeatMap / stalls 資料庫資料，或由主辦手動建立。
  renderSessionSeatRows([]);
  toggleSessionSeatSettings();
}

async function saveSessionSeatSettings(sid){
  if(!$('set_seatPricingEnabled')) return;
  const moduleOn = $('mod_seats') ? !!$('mod_seats').checked : true;
  const enabled=moduleOn && !!$('set_seatPricingEnabled').checked;
  const seats=collectSessionSeatItems();
  const mapUrl=String($('set_seatMapUrl')?.value||'').trim();
  const holdHours=Number($('set_seatHoldHours')?.value||24)||24;
  if(enabled || seats.length || mapUrl){
    await apiPost({action:'saveSeatMap',sessionId:sid,enabled,mapUrl,holdHours,seats});
  }
}

async function saveSessionSeatMapOnly(sid,btn){
  const mapUrl=String($('set_seatMapUrl')?.value||'').trim();
  if(!mapUrl){ toast('請先上傳或貼上已編號場地圖'); return; }
  const old=btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.textContent='儲存地圖中…'; }
  try{
    const moduleOn = $('mod_seats') ? !!$('mod_seats').checked : true;
    const enabled = moduleOn && !!$('set_seatPricingEnabled')?.checked;
    const holdHours=Number($('set_seatHoldHours')?.value||24)||24;
    const seats=collectSessionSeatItems();
    await apiPost({action:'saveSeatMap',sessionId:sid,enabled,mapUrl,holdHours,seats});
    AdminSessionSeatMapDirty=false;
    toast('已儲存場地圖，可建立或修改號碼清單');
    await loadSessionSeatSettings(sid, sessionById(sid)||{});
  }catch(e){ toast('儲存地圖失敗：'+e.message,8000); }
  finally{ if(btn){ btn.disabled=false; btn.textContent=old; } }
}

function hasTodoRegId(r){ return !!(r && (r.id||r.regId||r.registrationId||r.registration_id)); }
function normalizeTodoRow(r){
  const sid=r.sessionId||r.session_id||r.sessionID||regSessionId(r)||'';
  const ses=sessionById(sid);
  return {...r, sessionId:sid, sessionName:r.sessionName||r.session_name||sessionName(ses)||'場次', kind:r.kind||r.filter||todoKindFromRow(r), label:r.label||todoLabelFromKind(r.kind||r.filter||todoKindFromRow(r))};
}
function todoKindFromRow(r){
  const review=String(r.reviewStatus||r.status||r.review_status||'');
  const pay=String(r.paymentStatus||r.payStatus||r.payment_status||'');
  const transfer=String(r.transferStatus||r.transfer_status||r.refundStatus||r.refund_status||'');
  const check=String(r.checkinStatus||r.checkin||r.checkin_status||'');
  const eq=regEquipText(r);
  const dates=regDateText(r);
  const hasDataIssue = (dates.includes('未設定') || !r.email || !r.phone || !(r.brandName||r.brand||r.brand_name||r.name) || String(r.dataQualityIssues||'').length>0);
  if(isRefundCompletedRow(r)) return 'done';
  if(transfer.includes('退費')||transfer.includes('退款')||transfer.includes('refund')) return 'refund';
  if(hasDataIssue) return 'dataIssue';
  if(review.includes('待審核') || review==='待審' || review==='報名成功' || review==='') return 'pending';
  if(review.includes('已錄取') && (pay.includes('待確認')||pay.includes('付款待確認')||pay.includes('回報'))) return 'paymentPending';
  if(review.includes('已錄取') && (pay.includes('未繳費')||!pay)) return 'unpaid';
  if(review.includes('已錄取') && (isPaidText(pay)||isFreePayText(pay)) && !check.includes('已報到')) return 'checkin';
  if(review.includes('已錄取') && (isPaidText(pay)||isFreePayText(pay)) && eq && eq!=='無' && eq!=='未設定') return 'equipment';
  return 'all';
}
function todoLabelFromKind(kind){
  return {pending:'待審核',unpaid:'待付款',paymentPending:'付款待確認',checkin:'待報到',refund:'退費待處理',dataIssue:'資料異常',equipment:'設備待確認',all:'待處理'}[kind] || kind || '待處理';

async function buildTodoRowsFromSessions(){
  if(!AdminState.sessions.length){
    try{ const rows=await api({action:'getSessionDashboard'}); AdminState.sessions=Array.isArray(rows)?rows:[]; }catch(e){}
  }
  AdminState.currentLayer='todos';
  const wanted=[['pending','待審核'],['paymentPending','付款待確認'],['unpaid','待付款'],['refund','退費待處理']];
  const out=[]; const seen=new Set();
  for(const s of AdminState.sessions){
    const sid=sessionId(s); if(!sid) continue;
    for(const [kind,label] of wanted){
      let rows=[];
      try{ rows=await api({action:'getSessionRegistrations',sessionId:sid,filter:kind}); }catch(e){ rows=[]; }
      for(const r of (Array.isArray(rows)?rows:[])){
        if(!filterReg(r,kind)) continue;
        const id=String(r.id||r.regId||r.registrationId||r.registration_id||'');
        const key=id || (sid+'|'+kind+'|'+(r.email||'')+'|'+(r.createdAt||r.created_at||''));
        if(seen.has(key)) continue; seen.add(key);
        out.push({...r, sessionId:sid, sessionName:r.sessionName||sessionName(s), kind, label});
      }
    }
  }
  return out;
}

  for(const r of list){
    const sid=r.sessionId||'';

    const kind=todoKindFromRow(r);
    const label=todoLabelFromKind(kind);
    const who=r.brandName||r.brand||r.brand_name||r.name||r.email||'未填品牌';
    const phone=r.phone||r.mobile||'';
    const email=r.email||'';
    const dates=regDateText(r);
    const stalls=r.stallCount||r.stall_count||r.stalls||'';
    const amount=Number(r.amount||r.total||r.totalAmount||r.registration_total_amount||0);
    const equip=regEquipText(r);
    const info=[];
    const contact=[];
    if(r.name && r.name!==who) contact.push('聯絡人：'+safe(r.name));
    if(phone) contact.push('電話：'+safe(phone));

    const p=pcFor(s.id);
    const codeBox = p ? '<span style="font-size:26px;font-weight:900;letter-spacing:4px;color:#2a6a10">'+safe(p.code)+'</span>' : '<span style="color:#999">尚未產生</span>';
    const win = (p&&p.openFrom) ? '<div style="font-size:12px;color:#999;margin-top:4px">開放：'+safe(pcDate(p.openFrom))+' ～ '+safe(pcDate(p.openUntil))+'</div>' : '';
    const btns = p
      ? '<button class="btn small" onclick="genPasscode(\''+attr(s.id)+'\',this)">換碼</button><button class="btn small" style="background:#fdecea;color:#c0392b;border:1.5px solid #c0392b" onclick="togglePasscode(\''+attr(p.id)+'\',false,this)">停用</button>'
      : '<button class="btn small" onclick="genPasscode(\''+attr(s.id)+'\',this)">產生通行碼</button>';
    return '<div class="card" style="padding:14px;margin-bottom:10px">'
      +'<b>'+safe(s.name||s.id)+'</b>'
      +'<div style="display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap">'+codeBox+btns+'</div>'+win
      +'<div style="margin-top:10px"><label style="font-size:13px;color:#666">指派給（備註，例：小明）</label><input id="pc_note_'+attr(s.id)+'" value="'+attr(p?p.assignee:'')+'" placeholder="現場人員名字" style="width:100%;margin-top:4px"></div>'
      +'</div>';
  }).join('');
}
async function genPasscode(sid, btn){
  const inp=$('pc_note_'+sid); const note=(inp?inp.value:'').trim();
  const old=btn.textContent; btn.disabled=true; btn.textContent='產生中…';
  try{ await apiPost({action:'onsitePasscodeGenerate', sessionId:sid, assignee:note}); const list=await api({action:'onsitePasscodeList'}); AdminState.passcodes=Array.isArray(list)?list:[]; renderPasscodeCards(); toast('已產生通行碼'); }
  catch(e){ toast('產生失敗：'+e.message,6000); btn.disabled=false; btn.textContent=old; }
}
async function togglePasscode(id, active, btn){
  const old=btn?btn.textContent:''; if(btn){btn.disabled=true;btn.textContent='處理中…';}
  try{ await apiPost({action:'onsitePasscodeToggle', id, active}); const list=await api({action:'onsitePasscodeList'}); AdminState.passcodes=Array.isArray(list)?list:[]; renderPasscodeCards(); toast(active?'已啟用':'已停用'); }
  catch(e){ toast('失敗：'+e.message,6000); if(btn){btn.disabled=false;btn.textContent=old;} }
}
function renderFeatCoverList(events){ const el=$('featCoverList'); if(!el) return; if(!events || !events.length){ el.style.display='block'; el.innerHTML='<div class="empty">目前沒有活動</div>'; return; } el.innerHTML=events.map(e=>{ const cov=attr(e.cover||''); const coverInner = e.cover ? '<img src="'+cov+'" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=&#39;none&#39;">' : '<img src="IP指引.png" alt="" style="width:100%;height:100%;object-fit:contain;padding:14px" onerror="this.style.display=&#39;none&#39;">'; return '<div style="background:#fff;border-radius:18px;border:1px solid rgba(0,0,0,.08);overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.06);flex:0 0 260px;scroll-snap-align:start">'+'<div style="position:relative;height:140px;background:#DDEAD1;overflow:hidden">'+coverInner+'<div style="position:absolute;top:8px;right:8px;background:#fff;color:#2a6a10;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:800">主題活動</div></div>'+'<div style="padding:12px">'+'<div style="font-size:16px;font-weight:900;color:#2C2C2C;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+safe(e.title||e.id)+'</div>'+(e.location?'<div style="font-size:13px;color:#888;margin-bottom:6px">📍 '+safe(e.location)+'</div>':'')+'<div style="margin-top:8px"><label style="font-size:13px;color:#666">主題圖片網址</label>'+'<input id="feat_cover_'+attr(e.id)+'" value="'+cov+'" placeholder="貼上圖片網址 URL" style="width:100%;margin-top:5px">'+'<button class="btn small" style="margin-top:8px" onclick="saveFeatCover(\''+attr(e.id)+'\',this)">儲存圖片</button></div>'+'<div style="margin-top:12px;border-top:1px dashed #eee;padding-top:10px">'+'<button class="btn small" style="background:#fdecea;color:#c0392b;border:1.5px solid #c0392b" onclick="deleteFeatEvent(\''+attr(e.id)+'\',this)">刪除主題</button>'+'<div style="font-size:12px;color:#999;margin-top:6px">只刪這個主題，底下的場次會保留。</div></div>'+'</div></div>'; }).join(''); el.style.display='flex'; el.style.overflowX='auto'; el.style.gap='14px'; el.style.paddingBottom='10px'; el.style.scrollSnapType='x proximity'; el.style.webkitOverflowScrolling='touch'; bindFeatDragScroll(el); }
function bindFeatDragScroll(el){ if(!el || el.__dragBound) return; el.__dragBound=true; let down=false,sx,sl; el.addEventListener('mousedown',e=>{ if(e.target.closest('input,button,textarea')) return; down=true; sx=e.pageX-el.offsetLeft; sl=el.scrollLeft; el.style.cursor='grabbing'; }); el.addEventListener('mouseleave',()=>{ down=false; el.style.cursor=''; }); el.addEventListener('mouseup',()=>{ down=false; el.style.cursor=''; }); el.addEventListener('mousemove',e=>{ if(!down) return; e.preventDefault(); const x=e.pageX-el.offsetLeft; el.scrollLeft=sl-(x-sx)*1.5; }); }
async function deleteFeatEvent(id, btn){ const ev=(AdminState.featEvents||[]).find(x=>String(x.id)===String(id)); if(!ev){ toast('找不到主題'); return; } const cnt=(AdminState.sessions||[]).filter(s=>String(s.eventId||s.event_id||'')===String(id)).length; const msg='確定刪除主題「'+(ev.title||id)+'」嗎？\n\n只會刪這個主題，底下的場次不會被刪'+(cnt?('（目前有 '+cnt+' 個場次會保留）'):'')+'。\n此動作無法復原。'; if(!confirm(msg)) return; const old=btn.textContent; btn.disabled=true; btn.textContent='刪除中…'; try{ await apiPost({action:'deleteEvent', id:ev.id}); AdminState.featEvents=(AdminState.featEvents||[]).filter(x=>String(x.id)!==String(id)); renderFeatCoverList(AdminState.featEvents); toast('已刪除主題'); }catch(e){ toast('刪除失敗：'+e.message,6000); btn.disabled=false; btn.textContent=old; } }
async function saveFeatCover(id, btn){ const ev=(AdminState.featEvents||[]).find(x=>String(x.id)===String(id)); if(!ev){ toast('找不到活動'); return; } const inp=$('feat_cover_'+id); const cover=(inp?inp.value:'').trim(); const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'updateEvent',id:ev.id,title:ev.title||'',desc:ev.desc||ev.description||'',location:ev.location||'',status:ev.status||'',cover:cover}); ev.cover=cover; renderFeatCoverList(AdminState.featEvents); toast('已更新活動圖片'); }catch(e){ toast('儲存失敗：'+e.message,6000); }finally{ btn.disabled=false; btn.textContent=old; } }
async function applyTenantLogo(){ try{ const c=await api({action:'getSiteConfig'}); if(c && c.logoUrl){ document.querySelectorAll('.login-mark, .logo').forEach(img=>{ img.src=c.logoUrl; }); } }catch(e){} }
document.addEventListener('DOMContentLoaded', applyTenantLogo);
async function saveHomepageSettings(btn){ const old=btn.textContent; btn.disabled=true; btn.textContent='儲存中…'; try{ await apiPost({action:'saveSiteConfig',heroImg:$('home_hero').value,infoText:$('home_info').value,logoUrl:$('home_logo').value}); toast('首頁顯示已儲存'); }catch(e){toast('儲存失敗：'+e.message,6000)}finally{btn.disabled=false;btn.textContent=old;} }
(async function boot(){ const oauth=await handleOAuthCallback(); if(oauth) return; const s=readSession(); if(s&&s.email&&s.token){ saveSession(s); enterAdmin(); } })();
</script>
