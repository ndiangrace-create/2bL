<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>兔彼樂後台｜場次總覽管理</title>
  <style>
    :root{
      --bg:#F8F6F0;
      --paper:#FFFFFF;
      --ink:#1F1F1F;
      --muted:#6F6F6F;
      --line:#E8DFD4;
      --blue:#D9E5EE;
      --yellow:#FAEEC7;
      --green:#DDEAD1;
      --pink:#FAE1DD;
      --purple:#DCD7ED;
      --mint:#D4E3DD;
      --main:#82ABA3;
      --main2:#628E87;
      --shadow:0 12px 30px rgba(45,39,32,.08);
      --shadow2:0 18px 48px rgba(45,39,32,.16);
      --radius:22px;
      --radius2:16px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;font-size:17px;line-height:1.55}
    body{min-height:100vh}
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}
    .app-shell{max-width:1180px;margin:0 auto;padding:14px 14px 110px}
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#fff 0%,#F8F6F0 42%,#D9E5EE 100%)}
    .login-card{width:min(460px,100%);background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow2);padding:24px;text-align:center}
    .login-mark{width:76px;height:76px;margin:0 auto 14px;border-radius:24px;background:linear-gradient(135deg,var(--green),var(--blue));display:grid;place-items:center;font-size:38px;border:1px solid rgba(0,0,0,.04)}
    h1,h2,h3{margin:0}
    .login-card h1{font-size:28px;margin-bottom:8px}
    .sub{color:var(--muted);font-size:14px}
    .btn{border:0;border-radius:999px;background:var(--main);color:#fff;padding:10px 15px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;min-height:42px;box-shadow:0 3px 0 rgba(0,0,0,.05)}
    .btn:hover{filter:brightness(.98);transform:translateY(-1px)}
    .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
    .btn.blue{background:#86AFC9}.btn.green{background:#8BAF7A}.btn.yellow{background:#B99745}.btn.pink{background:#D97A73}.btn.purple{background:#8C7BB6}.btn.gray{background:#888}.btn.danger{background:#C8645D}
    .btn.small{min-height:34px;padding:7px 11px;font-size:14px}.btn.block{width:100%}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(248,246,240,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar-in{max-width:1180px;margin:0 auto;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}.brand-icon{width:44px;height:44px;border-radius:15px;background:var(--mint);display:grid;place-items:center;font-size:24px;border:1px solid var(--line);flex:0 0 auto}.brand-title{font-weight:950;font-size:20px;white-space:nowrap}.brand-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw}
    .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
    .tab{border:1px solid var(--line);background:#fff;border-radius:18px;padding:10px 8px;font-weight:950;color:var(--ink);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px}.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
    .notice{background:#fff;border:1px solid var(--line);border-left:7px solid var(--main);border-radius:18px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}
    .page-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:16px 0 10px}.page-title h2{font-size:26px}.page-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}.filter-row input,.filter-row select{border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 14px;min-height:42px}.filter-row input{flex:1;min-width:210px}.filter-row select{min-width:130px}
    .session-list{display:grid;gap:14px}
    .session-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .session-head{padding:16px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;background:linear-gradient(90deg,#fff 0%,#fff 55%,rgba(217,229,238,.45) 100%)}
    .session-name{font-size:22px;font-weight:950;line-height:1.25}.session-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 9px;background:#F4F0EA;border:1px solid var(--line);font-size:13px;font-weight:850;color:#333}.pill.blue{background:var(--blue)}.pill.green{background:var(--green)}.pill.yellow{background:var(--yellow)}.pill.pink{background:var(--pink)}.pill.purple{background:var(--purple)}
    .session-body{padding:14px 16px 16px}.section-label{font-size:14px;font-weight:950;color:#333;margin:6px 0 8px;display:flex;align-items:center;gap:6px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.stat{border:1px solid var(--line);border-radius:17px;padding:10px;background:#fff;min-height:78px;display:flex;flex-direction:column;justify-content:center;text-align:center}.stat.click{cursor:pointer}.stat.click:hover{border-color:#9EB9B4;box-shadow:0 8px 20px rgba(0,0,0,.08);transform:translateY(-1px)}.stat b{font-size:24px;line-height:1;font-weight:950}.stat span{font-size:13px;color:var(--muted);font-weight:850;margin-top:5px}.stat.blue{background:rgba(217,229,238,.55)}.stat.green{background:rgba(221,234,209,.7)}.stat.yellow{background:rgba(250,238,199,.75)}.stat.pink{background:rgba(250,225,221,.75)}.stat.purple{background:rgba(220,215,237,.70)}
    .compact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.info-box{border:1px solid var(--line);background:#fff;border-radius:17px;padding:12px;min-height:86px}.info-box b{font-size:18px}.info-line{display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px dashed #EEE4D8;padding:7px 0}.info-line:last-child{border-bottom:0}.info-line span:first-child{color:var(--muted);font-weight:850}.info-line span:last-child{font-weight:950;text-align:right}
    .card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.setting-box{margin-top:12px;border:1px solid var(--line);border-radius:18px;background:#FFFEFB;display:none}.setting-box.open{display:block}.setting-inner{padding:14px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-field{display:flex;flex-direction:column;gap:5px}.form-field.full{grid-column:1/-1}.form-field label{font-size:13px;color:var(--muted);font-weight:900}.form-field input,.form-field select,.form-field textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px 12px}.form-field textarea{min-height:90px;resize:vertical}.field-note{font-size:12px;color:var(--muted)}
    .panel{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}.panel.show{display:flex}.panel-head{position:sticky;top:0;background:rgba(248,246,240,.95);backdrop-filter:blur(12px);z-index:2;border-bottom:1px solid var(--line);padding:10px 12px}.panel-head-in{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-title{font-size:20px;font-weight:950}.panel-sub{font-size:12px;color:var(--muted)}.xbtn{width:44px;height:44px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:20px;font-weight:950;color:#333}.panel-body{flex:1;overflow:auto;padding:14px 14px calc(92px + var(--safe-bottom));max-width:1180px;width:100%;margin:0 auto}.panel-bottom{position:sticky;bottom:0;background:rgba(248,246,240,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px calc(10px + var(--safe-bottom));display:flex;justify-content:center}
    .cards{display:grid;gap:10px}.reg-card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px}.reg-title{font-size:20px;font-weight:950}.reg-sub{font-size:13px;color:var(--muted);margin-top:2px}.kv{display:grid;grid-template-columns:92px 1fr;gap:4px 10px;margin-top:10px;font-size:14px}.kv .k{color:var(--muted);font-weight:850}.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.tag{border-radius:999px;background:#F4F0EA;border:1px solid var(--line);padding:4px 8px;font-size:12px;font-weight:900}.tag.ok{background:var(--green)}.tag.warn{background:var(--yellow)}.tag.bad{background:var(--pink)}.tag.info{background:var(--blue)}.tag.purple{background:var(--purple)}.reg-actions{display:flex;flex-direction:column;gap:7px;min-width:106px}.empty{background:#fff;border:1px dashed var(--line);border-radius:20px;padding:24px;text-align:center;color:var(--muted);font-weight:850}.loading{padding:28px;text-align:center;color:var(--muted);font-weight:900}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:#1f1f1f;color:#fff;padding:11px 15px;border-radius:999px;font-weight:850;box-shadow:var(--shadow2);opacity:0;pointer-events:none;transition:.22s;z-index:300;max-width:92vw;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .settings-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.settings-tile{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;text-align:center;box-shadow:var(--shadow);min-height:110px}.settings-tile .ico{font-size:28px}.settings-tile b{display:block;margin-top:6px}.settings-tile span{display:block;margin-top:2px;color:var(--muted);font-size:12px}.todo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.todo-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:var(--shadow);cursor:pointer}.todo-card b{font-size:28px}.todo-card span{display:block;color:var(--muted);font-weight:850}.member-list{display:grid;gap:10px}.table-wrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:18px}.mini-table{border-collapse:collapse;width:100%;min-width:720px}.mini-table th,.mini-table td{border-bottom:1px solid #EFE6DC;padding:9px 10px;text-align:left;font-size:14px}.mini-table th{background:#FBF8F1;font-weight:950}.warn-box{background:var(--yellow);border:1px solid #E6CE88;border-radius:16px;padding:12px;font-weight:850;color:#5B4720}.danger-zone{border:1px solid #E6AAA3;background:#FFF7F6;border-radius:16px;padding:12px}.sr-only{position:absolute;left:-9999px}
    @media(max-width:860px){
      html,body{font-size:16px}.app-shell{padding:10px 10px 96px}.topbar-in{padding:10px}.brand-title{font-size:17px}.brand-sub{max-width:45vw}.top-actions .hide-sm{display:none}.tabs{position:fixed;left:8px;right:8px;bottom:8px;z-index:30;margin:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:22px;padding:7px;box-shadow:var(--shadow2)}.tab{font-size:13px;min-height:44px;border-radius:16px;padding:7px 3px}.page-title{display:block}.page-actions{margin-top:10px;justify-content:flex-start}.session-head{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr);gap:7px}.stat{min-height:70px;padding:8px}.stat b{font-size:21px}.stat span{font-size:12px}.compact-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.reg-card{grid-template-columns:1fr}.reg-actions{flex-direction:row;flex-wrap:wrap}.reg-actions .btn{flex:1 1 auto}.settings-grid{grid-template-columns:1fr 1fr}.todo-grid{grid-template-columns:1fr 1fr}.panel-title{font-size:18px}.kv{grid-template-columns:82px 1fr}.session-name{font-size:20px}.card-actions .btn{flex:1 1 calc(50% - 8px)}
    }
    @media(max-width:430px){.stats{grid-template-columns:repeat(2,1fr)}.settings-grid,.todo-grid{grid-template-columns:1fr}.card-actions .btn{flex:1 1 100%}.top-actions{gap:5px}.btn.small{font-size:13px;padding:7px 9px}.brand-icon{width:40px;height:40px}.login-card{padding:20px}}
  </style>
</head>
<body>
  <section id="loginPage" class="login-wrap">
    <div class="login-card">
      <div class="login-mark">🐰</div>
      <h1>兔彼樂後台</h1>
      <div class="sub">乾淨版後台｜場次總覽即場次管理</div>
      <div style="height:18px"></div>
      <button class="btn block" onclick="startGoogleLogin()">使用 Google 登入</button>
      <div id="loginErr" class="notice hidden" style="margin-top:14px;border-left-color:#D97A73;text-align:left"></div>
    </div>
  </section>

  <section id="adminPage" class="hidden">
    <header class="topbar">
      <div class="topbar-in">
        <div class="brand">
          <div class="brand-icon">🐰</div>
          <div style="min-width:0">
            <div class="brand-title">兔彼樂後台</div>
            <div class="brand-sub" id="whoText">尚未登入</div>
          </div>
        </div>
        <div class="top-actions">
          <button class="btn secondary small hide-sm" onclick="reloadAll()">重新整理</button>
          <button class="btn secondary small" onclick="window.open('onsite.html','_blank')">現場入口</button>
          <button class="btn gray small" onclick="logout()">登出</button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <nav class="tabs" aria-label="後台主選單">
        <button id="tab-sessions" class="tab active" onclick="switchPage('sessions')">場次</button>
        <button id="tab-todos" class="tab" onclick="switchPage('todos')">待辦</button>
        <button id="tab-members" class="tab" onclick="switchPage('members')">會員</button>
        <button id="tab-settings" class="tab" onclick="switchPage('settings')">設定</button>
      </nav>

      <section id="page-sessions">
        <div class="page-title">
          <div>
            <h2>場次總覽 / 場次管理</h2>
            <div class="sub">每一場就是一張管理卡；點數字直接打開該場名單，全螢幕彈窗，不再堆疊舊頁面。</div>
          </div>
          <div class="page-actions">
            <button class="btn secondary" onclick="reloadAll()">重新整理</button>
            <button class="btn" onclick="openSessionCreatePanel()">＋ 新增場次</button>
          </div>
        </div>
        <div class="filter-row">
          <input id="sessionSearch" placeholder="搜尋場次、合作單位、地點" oninput="renderSessions()" />
          <select id="sessionStatusFilter" onchange="renderSessions()">
            <option value="current">進行中</option>
            <option value="all">全部</option>
            <option value="archived">封存</option>
          </select>
        </div>
        <div id="sessionList" class="session-list"><div class="loading">載入場次中…</div></div>
      </section>

      <section id="page-todos" class="hidden">
        <div class="page-title">
          <div>
            <h2>全部待辦</h2>
            <div class="sub">跨場次快速處理中心。這裡只做快速審核與金流待辦，每張卡片都會標明場次。</div>
          </div>
        </div>
        <div id="todoGrid" class="todo-grid"></div>
      </section>

      <section id="page-members" class="hidden">
        <div class="page-title">
          <div>
            <h2>會員 / 品牌</h2>
            <div class="sub">查品牌、會員、歷史報名。正式狀態仍以每一場的 registration 為準。</div>
          </div>
        </div>
        <div class="filter-row"><input id="memberSearch" placeholder="搜尋品牌、姓名、手機、Email、FB、IG" oninput="renderMembers()" /></div>
        <div id="memberList" class="member-list"></div>
      </section>

      <section id="page-settings" class="hidden">
        <div class="page-title">
          <div>
            <h2>系統設定</h2>
            <div class="sub">設定都以全螢幕彈窗開啟；不在主畫面堆內容。</div>
          </div>
        </div>
        <div class="settings-grid">
          <button class="settings-tile" onclick="openEmailSettings()"><div class="ico">✉️</div><b>信件模板</b><span>寄信診斷 / 模板狀態</span></button>
          <button class="settings-tile" onclick="openPaymentSettings()"><div class="ico">💳</div><b>付款資訊</b><span>場次付款資料整理</span></button>
          <button class="settings-tile" onclick="openAgreementSettings()"><div class="ico">📋</div><b>合約管理</b><span>三個模板可存</span></button>
          <button class="settings-tile" onclick="openStaffSettings()"><div class="ico">🔐</div><b>權限管理</b><span>管理帳號 / 現場人員</span></button>
          <button class="settings-tile" onclick="openCompanySettings()"><div class="ico">🏷️</div><b>公司資料</b><span>系統提供者資訊</span></button>
        </div>
      </section>
    </main>
  </section>

  <section id="panel" class="panel" aria-modal="true" role="dialog">
    <div class="panel-head">
      <div class="panel-head-in">
        <div style="min-width:0">
          <div id="panelTitle" class="panel-title">彈窗</div>
          <div id="panelSub" class="panel-sub"></div>
        </div>
        <button class="xbtn" onclick="closePanel()" aria-label="關閉">×</button>
      </div>
    </div>
    <div id="panelBody" class="panel-body"></div>
    <div class="panel-bottom"><button class="btn secondary" onclick="closePanel()">← 返回上一頁</button></div>
  </section>

  <div id="toast" class="toast"></div>

<script>
'use strict';
const API='https://2bl-v7.ndiangrace.workers.dev';
const TENANT_KEY='2bl_tenant';
const SESSION_KEY='tb_v3';
const urlParams=new URLSearchParams(location.search);
(function bootstrapUrl(){
  const tenant=urlParams.get('tenant')||urlParams.get('tenantId');
  const token=urlParams.get('admin_token');
  const err=urlParams.get('login_error');
  if(tenant) sessionStorage.setItem(TENANT_KEY,tenant);
  if(token) sessionStorage.setItem('2bl_admin_token_pending',token);
  if(err) sessionStorage.setItem('2bl_login_error_pending',err);
  if(tenant||token||err) history.replaceState({},'',location.pathname+(tenant?'?tenant='+encodeURIComponent(tenant):''));
})();
let TENANT_ID=sessionStorage.getItem(TENANT_KEY)||urlParams.get('tenant')||urlParams.get('tenantId')||'tuibile';
const ST={email:'',token:'',role:'',name:'',events:[],sessions:[],regs:[],staff:[],agreements:[],siteConfig:{},currentPage:'sessions',panel:{type:'',sessionId:'',filter:''},panelRegs:[],panelStack:[]};
const $=id=>document.getElementById(id);
const safe=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const attr=s=>safe(s).replace(/`/g,'&#96;');
const money=n=>'NT$ '+(Number(n)||0).toLocaleString('zh-TW');
const int=n=>Number(n||0)||0;
const toast=(msg,dur=2600)=>{const t=$('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); clearTimeout(toast._timer); toast._timer=setTimeout(()=>t.classList.remove('show'),dur);};
const unwrap=j=>Array.isArray(j)?j:(Array.isArray(j?.data)?j.data:(j?.data!==undefined?j.data:j));
function endpoint(){return API.replace(/\/+$/,'');}
async function api(params={}){
  const p={...params,tenant:params.tenant||TENANT_ID,email:params.email||ST.email||'_',token:params.token||ST.token||'',_t:Date.now()};
  const qs=new URLSearchParams(); Object.entries(p).forEach(([k,v])=>{if(v!==undefined&&v!==null)qs.set(k,typeof v==='object'?JSON.stringify(v):String(v));});
  const r=await fetch(API+'?'+qs.toString(),{cache:'no-store'});
  const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'}));
  if(!r.ok||j?.error) throw new Error(j?.error||j?.message||('連線失敗 '+r.status));
  return unwrap(j);
}
async function apiPost(body={}){
  const r=await fetch(API+'?_t='+Date.now(),{method:'POST',headers:{'Content-Type':'application/json;charset=utf-8','Cache-Control':'no-store'},cache:'no-store',body:JSON.stringify({...body,tenant:body.tenant||TENANT_ID,email:body.email||ST.email,token:body.token||ST.token})});
  const j=await r.json().catch(()=>({error:'後端回傳不是 JSON'}));
  if(!r.ok||j?.error) throw new Error(j?.error||j?.message||('連線失敗 '+r.status));
  return unwrap(j);
}
function startGoogleLogin(){location.href=endpoint()+'/auth/google/start?tenant='+encodeURIComponent(TENANT_ID);}
async function handleOAuthCallback(){
  const token=sessionStorage.getItem('2bl_admin_token_pending');
  const loginError=sessionStorage.getItem('2bl_login_error_pending');
  sessionStorage.removeItem('2bl_admin_token_pending'); sessionStorage.removeItem('2bl_login_error_pending');

function sessionId(s){return String(s.id||s.sessionId||s.sesId||'');}
function regSessionId(r){return String(r.sessionId||r.sesId||r.session_id||'');}
function sessionName(s){return s.name||s.title||s.sessionName||'未命名場次';}
function sessionById(id){return ST.sessions.find(s=>sessionId(s)===String(id))||{};}
function regsForSession(id){return ST.regs.filter(r=>regSessionId(r)===String(id));}
function isArchived(s){return ['封存','隱藏','已封存'].includes(String(s.status||''));}
function isClosed(s){return ['關閉','已關閉','停用','已截止'].includes(String(s.status||''));}
function isPendingReview(r){const st=String(r.status||r.reviewStatus||''); return st.includes('待審')||st==='報名成功'||st==='審核中'||st==='';}
function isApproved(r){const st=String(r.status||r.reviewStatus||''); return st.includes('錄取')&&!st.includes('不錄取');}
function isRejected(r){const st=String(r.status||r.reviewStatus||''); return st.includes('不錄取')||st.includes('拒絕');}
function isWait(r){const st=String(r.status||r.reviewStatus||''); return st.includes('備取');}
function payText(r){return String(r.payStatus||r.paymentStatus||r.payment_status||'未繳費');}
function isPaymentPending(r){const p=payText(r); return p.includes('待確認')||p.includes('已回報')||p.includes('回報');}
function isPaid(r){const p=payText(r); return p.includes('已繳')||p.includes('已付款')||p==='免費';}
function hasAmountField(r){return ['totalAmount','amount','registrationTotalAmount','registration_total_amount','invoice_total'].some(k=>r[k]!==undefined&&r[k]!==null&&r[k]!=='');}
function isFree(r){const p=payText(r); return p==='免費'||p.includes('免費')||(hasAmountField(r)&&regAmount(r)===0&&String(r.status||r.reviewStatus||'').includes('錄取'));}
function isUnpaid(r){const p=payText(r); return !isPaid(r)&&!isPaymentPending(r)&&!p.includes('取消')&&!p.includes('退款');}
function isChecked(r){return String(r.checkin||r.checkinStatus||'').includes('已報到');}
function isRefund(r){return [r.transferStatus,r.refundStatus,r.status,r.payStatus].some(v=>String(v||'').includes('退費')||String(v||'').includes('退款'));}
function equipObj(v){let o=v||{}; if(typeof o==='string'){try{o=JSON.parse(o||'{}')}catch(e){o={}}} return o||{};}
function equipText(v){const o=equipObj(v); const arr=[]; Object.entries(o).forEach(([k,v])=>{if(typeof v==='object'){const n=Number(v.qty||v.count||v.value||0); if(n>0)arr.push(`${k}×${n}`)}else{const n=Number(v)||0; if(n>0)arr.push(`${k}×${n}`)}}); return arr.join('、')||'—';}
function equipTotals(regs){const totals={}; regs.forEach(r=>{const o=equipObj(r.equip||r.equipment||r.equipJson); Object.entries(o).forEach(([k,v])=>{let n=0; if(typeof v==='object')n=Number(v.qty||v.count||v.value||0); else n=Number(v)||0; if(n>0) totals[k]=(totals[k]||0)+n;});}); return totals;}
function regAmount(r){return Number(r.totalAmount||r.amount||r.registrationTotalAmount||r.registration_total_amount||r.invoice_total||0)||0;}
function paidAmount(r){return Number(r.paidAmount||r.amountPaid||r.paid_amount||r.amount||0)||0;}
function sessionSummary(s){
  const regs=regsForSession(sessionId(s));
  const total=int(s.total||s.regTotal||regs.length);
  const pending=int(s.pending||s.pendingReview||regs.filter(isPendingReview).length);
  const approved=int(s.approved||regs.filter(isApproved).length);
  const unpaid=int(s.unpaid||regs.filter(isUnpaid).length);
  const paymentPending=int(s.paymentPending||s.pendingPayment||regs.filter(isPaymentPending).length);
  const paid=int(s.paid||regs.filter(r=>isPaid(r)||isFree(r)).length);
  const checked=int(s.checkedIn||s.checkinDone||regs.filter(isChecked).length);
  const refund=int(s.refund||s.refundPending||regs.filter(isRefund).length);
  const stallCount=int(s.stallCount||s.stalls||regs.reduce((sum,r)=>sum+int(r.stallCount||r.qty||1),0));
  const deposit=int(s.depositTotal||regs.reduce((sum,r)=>sum+int(r.deposit||r.depositTotal||0),0));
  const receivable=int(s.receivable||s.invoiceTotal||regs.reduce((sum,r)=>sum+regAmount(r),0));
  const received=int(s.paidAmount||s.revenue||s.paidTotal||regs.reduce((sum,r)=>sum+(isPaid(r)||isFree(r)?regAmount(r):0),0));
  return {regs,total,pending,approved,unpaid,paymentPending,paid,checked,refund,stallCount,deposit,receivable,received,unreceived:Math.max(receivable-received,0),equip:equipTotals(regs)};
}
function formatDate(s){
  const dates=Array.isArray(s?.dates)?s.dates.map(d=>d?.date||d).filter(Boolean):[];
  if(!dates.length&&s.date) dates.push(...String(s.date).split(/[、,，\s]+/).filter(Boolean));
  if(!dates.length)return '未設定日期';
  const short=v=>String(v).replace(/^\d{4}-/,'').replace(/-/g,'/');
  return dates.length>1?short(dates[0])+'－'+short(dates[dates.length-1]):short(dates[0]);
}

function renderRegActions(id,r){
  const b=[];
  if(isPendingReview(r)){

    b.push(`<button class="btn small danger" onclick="regAction('${attr(id)}','reject',this)">不錄取</button>`);
    b.push(`<button class="btn small secondary" onclick="regAction('${attr(id)}','waitlist',this)">備取</button>`);
  }
  if(isPaymentPending(r)){b.push(`<button class="btn small yellow" onclick="regAction('${attr(id)}','confirmPay',this)">確認付款</button>`);}
  if(isUnpaid(r)||isPaymentPending(r)){b.push(`<button class="btn small secondary" onclick="regAction('${attr(id)}','reported',this)">已回報</button>`);}
  if(isUnpaid(r)){b.push(`<button class="btn small danger" onclick="regAction('${attr(id)}','cancelUnpaid',this)">未繳費取消</button>`);}

async function regAction(id,mode,btn){
  if(!id){toast('找不到報名 ID');return;}
  const confirmText={reject:'確定標記為不錄取？',waitlist:'確定標記為備取？',confirmPay:'確定確認付款？',cancelUnpaid:'確定取消此未繳費報名？紀錄會保留。',undoCheckin:'確定取消報到？'}[mode];
  if(confirmText&&!confirm(confirmText))return;
  const old=btn.textContent; btn.disabled=true; btn.textContent='處理中…';
  try{
    if(mode==='approve')await apiPost({action:'approveReg',regId:id,approved:true});
    if(mode==='reject')await apiPost({action:'approveReg',regId:id,approved:false});
    if(mode==='waitlist')await apiPost({action:'approveReg',regId:id,status:'備取'});
    if(mode==='reported')await apiPost({action:'markPaymentScreenshot',regId:id});
    if(mode==='cancelUnpaid')await apiPost({action:'adminCancelReg',regId:id});
    if(mode==='confirmPay')await apiPost({action:'confirmPayment',regId:id});
    if(mode==='checkin')await apiPost({action:'checkin',regId:id});
    if(mode==='undoCheckin')await apiPost({action:'checkin',regId:id,undo:true});
    toast('已更新'); await reloadAll(); if(ST.panel?.type==='list') await openListPanel(ST.panel.sessionId,ST.panel.filter,$('panelTitle').textContent.split('｜').pop()||'名單');
  }catch(e){toast('操作失敗：'+e.message,5000)}finally{btn.disabled=false;btn.textContent=old;}
}

    if(type==='company'){

      payload.companyEmail=$('companyEmail')?.value||'';
      payload.companyContact=$('companyContact')?.value||'';
      payload.companyNote=$('companyNote')?.value||'';

}

function openSessionCreatePanel(){openPanel('新增場次','乾淨版只建立核心場次資料；進階選位與合約可儲存後再由場次卡補設定。',`<div class="form-grid"><div class="form-field full"><label>場次名稱</label><input id="newSesName"></div><div class="form-field"><label>類型</label><input id="newSesType" value="市集場次"></div><div class="form-field"><label>地點</label><input id="newSesVenue"></div><div class="form-field"><label>合作單位</label><input id="newSesOrganizer"></div><div class="form-field"><label>日期</label><input id="newSesDate" placeholder="2026-07-18"></div><div class="form-field"><label>攤位費</label><input id="newSesFee" type="number" value="0"></div><div class="form-field"><label>押金</label><input id="newSesDeposit" type="number" value="0"></div><div class="form-field"><label>審核制</label><select id="newSesReview"><option value="1">開啟</option><option value="0">關閉</option></select></div><div class="form-field full"><label>說明</label><textarea id="newSesDesc"></textarea></div></div><div class="card-actions"><button class="btn" onclick="createSessionClean(this)">建立場次</button></div>`)}
async function createSessionClean(btn){const name=$('newSesName').value.trim(); if(!name){toast('請輸入場次名稱');return;} const old=btn.textContent; btn.disabled=true; btn.textContent='建立中…'; try{await apiPost({action:'createSession',eventId:'',name,type:$('newSesType').value||'市集場次',venue:$('newSesVenue').value,organizer:$('newSesOrganizer').value,dates:parseDates($('newSesDate').value),fee:int($('newSesFee').value),deposit:int($('newSesDeposit').value),needReview:$('newSesReview').value==='1',desc:$('newSesDesc').value,status:'報名中'}); toast('已建立場次'); closePanel(); await reloadAll();}catch(e){toast('建立失敗：'+e.message,5000)}finally{btn.disabled=false;btn.textContent=old;}}
function excelEscape(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function downloadSessionExcel(sid){
  const s=sessionById(sid); let rows=regsForSession(sid);
  if(!rows.length){
    try{const got=await api({action:'getRegsBySession',sessionId:sid}); rows=Array.isArray(got)?got:[];}catch(e){toast('下載資料載入失敗：'+e.message,5000);return;}
  }
  const headers=['場次名稱','合作單位','活動日期','地點','報名編號','報名日期','品牌名稱','聯絡人','手機','Email','FB','IG','審核狀態','付款狀態','報到狀態','攤位數','設備明細','押金','應收金額','已收金額','未收金額','發票統編','發票抬頭','發票Email','攤位號碼','備註'];
  const body=rows.map(r=>[sessionName(s),s.organizer||s.coorg||'',formatDate(s),s.venue||'',r.id||'',r.createdAt||r.joined_at||'',r.brand||r.brandName||r.brand_name||'',r.name||'',r.phone||'',r.email||'',r.fb||'',r.ig||'',r.status||r.reviewStatus||'',payText(r),r.checkin||r.checkinStatus||'',r.stallCount||r.qty||1,equipText(r.equip||r.equipment||r.equipJson),r.deposit||r.depositTotal||0,regAmount(r),isPaid(r)||isFree(r)?regAmount(r):0,isPaid(r)||isFree(r)?0:regAmount(r),r.taxId||r.invoiceTaxId||'',r.invoiceTitle||'',r.invoiceEmail||'',r.stallNo||r.boothNo||'',r.adminNote||r.remark||'']);
  const html=`<html><head><meta charset="UTF-8"></head><body><table border="1"><thead><tr>${headers.map(h=>`<th>${excelEscape(h)}</th>`).join('')}</tr></thead><tbody>${body.map(row=>`<tr>${row.map(c=>`<td>${excelEscape(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></body></html>`;
  const blob=new Blob(['﻿',html],{type:'application/vnd.ms-excel;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(sessionName(s)||'場次')+'_完整名單.xls'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);
}
window.addEventListener('keydown',e=>{if(e.key==='Escape'&&$('panel').classList.contains('show'))closePanel();});
(async function boot(){const did=await handleOAuthCallback(); if(did)return; const s=readSession(); if(s&&s.token&&s.email){saveSession(s); enterAdmin();} })();
